<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text to Handwriting</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat&family=Homemade+Apple&family=Shadows+Into+Light&family=Reenie+Beanie&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}
.controls{padding:10px;background:#222;color:#fff;display:flex;flex-wrap:wrap;gap:10px}
textarea{width:100%;height:100px}
button{padding:10px;border:none;background:#3498db;color:#fff;cursor:pointer}
select{padding:5px}
.page{width:794px;height:1123px;margin:20px auto;position:relative;box-sizing:border-box;padding:40px}
.ruled{background:repeating-linear-gradient(to bottom,#fff 0px,#fff 33px,#cce0ff 34px),linear-gradient(to right,#ff4d4d 40px,transparent 40px)}
.plain{background:#fff}
.cream{background:#fdf6e3}
.content{white-space:pre-wrap;line-height:34px;font-size:22px}
</style>
</head>
<body>
<div class="controls">
<textarea id="inputText" placeholder="Enter text..."></textarea>
<select id="font">
<option value="Caveat">Caveat</option>
<option value="Homemade Apple">Homemade Apple</option>
<option value="Shadows Into Light">Shadows Into Light</option>
<option value="Reenie Beanie">Reenie Beanie</option>
</select>
<select id="color">
<option value="#1a3c8e">Blue</option>
<option value="#222222">Black</option>
<option value="#c0392b">Red</option>
</select>
<select id="paper">
<option value="ruled">Ruled</option>
<option value="plain">Plain</option>
<option value="cream">Cream</option>
</select>
<button onclick="generate()">Generate Preview</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>
<div id="preview"></div>
<script>
function generate(){
 const text=document.getElementById('inputText').value;
 const preview=document.getElementById('preview');
 preview.innerHTML='';
 const lines=text.split('\n');
 const linesPerPage=30;
 let page;
 lines.forEach((line,i)=>{
  if(i%linesPerPage===0){
    page=document.createElement('div');
    page.className='page '+document.getElementById('paper').value;
    const content=document.createElement('div');
    content.className='content';
    content.style.fontFamily=document.getElementById('font').value;
    content.style.color=document.getElementById('color').value;
    page.appendChild(content);
    preview.appendChild(page);
  }
  page.querySelector('.content').innerHTML+=line+'\n';
 });
}
function downloadPDF(){
 const element=document.getElementById('preview');
 html2pdf().from(element).save('handwriting.pdf');
}
</script>
</body>
</html>
