<!DOCTYPE html>
<html>
<head>
    <title>Study Helper 💙</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #eef;
        }

        h1 {
            margin-top: 20px;
        }

        textarea {
            width: 85%;
            height: 120px;
            margin-top: 20px;
            font-size: 16px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

        img {
            margin-top: 20px;
            width: 90%;
            display: none;
            border: 2px solid #ccc;
        }
    </style>
</head>

<body>

    <h1>📚 Study Helper 💙</h1>
    <p>Paste answer and get handwritten notes ✍️</p>

    <textarea id="text" placeholder="Paste your answer..."></textarea><br>

    <button onclick="showNote()">Generate ✍️</button>

    <br>

    <!-- IMPORTANT: correct path -->
    <img id="noteImage" src="/study-helper/note1.png">

    <script>
        function showNote() {
            let text = document.getElementById("text").value;

            if(text.trim() === "") {
                alert("Please paste answer first!");
                return;
            }

            document.getElementById("noteImage").style.display = "block";
        }
    </script>

</body>
</html>
