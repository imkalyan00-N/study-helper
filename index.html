<!DOCTYPE html>
<html>
<head>
  <title>AI Handwritten Notes ✍️</title>

  <!-- Handwriting font -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <!-- FREE AI -->
  <script src="https://js.puter.com/v2/"></script>

  <style>
    body{
      text-align:center;
      background:#e5e5e5;
      font-family:sans-serif;
    }

    textarea{
      width:320px;
      height:120px;
      margin:10px;
    }

    canvas{
      margin-top:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
      border-radius:12px;
    }

    button{
      padding:10px;
      margin:5px;
    }
  </style>
</head>

<body>

<h2>AI Handwritten Notes ✍️</h2>

<textarea id="text" placeholder="Type your question or rough answer..."></textarea><br>

<button onclick="generateAI()">Generate</button>

<br>
<canvas id="canvas" width="800" height="1000"></canvas>

<script>

// 🧠 AI FORMATTER (FREE)
async function generateAI(){

  const input = document.getElementById("text").value;

  try{

    const response = await puter.ai.chat(`
    Convert this into exam answer format with:
    - headings
    - short explanation
    - bullet points
    - neat structure

    Text:
    ${input}
    `);

    document.getElementById("text").value = response;

    generate(); // handwriting render

  }catch(e){
    alert("AI failed 😓");
    console.log(e);
  }
}


// 📄 PAPER DESIGN
function drawPaper(ctx){

  ctx.fillStyle = "#fbfbf5";
  ctx.fillRect(0,0,800,1000);

  // ruled lines
  ctx.strokeStyle="rgba(150,180,255,0.5)";
  for(let i=100;i<1000;i+=40){
    ctx.beginPath();
    ctx.moveTo(0,i);
    ctx.lineTo(800,i);
    ctx.stroke();
  }

  // margin
  ctx.strokeStyle="rgba(255,0,0,0.6)";
  ctx.beginPath();
  ctx.moveTo(70,0);
  ctx.lineTo(70,1000);
  ctx.stroke();
}


// ✍️ HANDWRITING
function generate(){

  const text = document.getElementById("text").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,800,1000);
  drawPaper(ctx);

  ctx.font="26px 'Dancing Script'";

  let x = 90;
  let y = 140;
  let lineHeight = 40;

  let lines = text.split("\n");

  lines.forEach(line => {

    if(y > 950) return;

    let isHeading = line === line.toUpperCase();

    ctx.fillStyle = isHeading ? "#000" : "#1e3a8a";

    let words = line.split(" ");
    let currX = x;

    words.forEach(word => {

      let w = ctx.measureText(word).width;

      if(currX + w > 700){
        currX = x;
        y += lineHeight;
      }

      // slight tilt (handwriting feel)
      let tilt = (Math.random()*2 -1) * 0.05;

      ctx.save();
      ctx.translate(currX,y-5);
      ctx.rotate(tilt);
      ctx.fillText(word,0,0);
      ctx.restore();

      currX += w + 8;
    });

    // underline heading
    if(isHeading){
      ctx.beginPath();
      ctx.moveTo(x,y+5);
      ctx.lineTo(currX,y+5);
      ctx.strokeStyle="#000";
      ctx.stroke();
    }

    y += lineHeight;

  });

}

</script>

</body>
</html>
