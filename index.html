<!DOCTYPE html>
<html>
<head>
  <title>Exam Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      background: #ececec;
      font-family: sans-serif;
    }

    textarea {
      width: 320px;
      height: 130px;
      margin-top: 15px;
      display: none;
    }

    canvas {
      margin-top: 20px;
      background: #fffef8;
      box-shadow: 0 0 15px rgba(0,0,0,0.25);
    }

    button {
      margin: 6px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Handwritten Notes ✍️</h2>

<!-- TOP CONTROLS -->
<div>
  <button onclick="selectPaper('ruled')">Ruled</button>
  <button onclick="selectPaper('white')">White</button>
  <button onclick="generate()">Generate</button>
</div>

<textarea id="text" placeholder="Type notes..."></textarea>

<br>
<canvas id="canvas"></canvas>

<!-- DOWNLOAD -->
<div style="margin-top:20px;">
  <button onclick="downloadImage()">Download Image</button>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let paperType="ruled";

function selectPaper(type){
  paperType=type;
  document.getElementById("text").style.display="block";
}

// detection
function isHeading(line){
  return line === line.toUpperCase() && line.includes(" ") && line.length < 40;
}

function isQuestion(line){
  return line.trim().endsWith("?");
}

function isCode(line){
  return /[{}();=<>]/.test(line);
}

// underline
function drawUnderline(ctx,x,y,w){
  ctx.beginPath();
  for(let i=0;i<=w;i+=5){
    let wave=Math.sin(i*0.05)*1;
    ctx.lineTo(x+i,y+6+wave);
  }
  ctx.stroke();
}

// paper
function drawPaper(ctx,height){
  ctx.fillStyle="#fffef8";
  ctx.fillRect(0,0,800,height);

  if(paperType==="ruled"){
    ctx.strokeStyle="rgba(0,120,255,0.35)";

    for(let i=60;i<height;i+=30){
      ctx.beginPath();
      ctx.moveTo(0,i);
      ctx.lineTo(800,i);
      ctx.stroke();
    }

    ctx.strokeStyle="rgba(255,0,0,0.5)";
    ctx.beginPath();
    ctx.moveTo(70,0);
    ctx.lineTo(70,height);
    ctx.stroke();
  }
}

// MAIN
function generate(){
  const text=document.getElementById("text").value;
  const lines=text.split("\n");

  let height = 1000 + (lines.length * 30); // dynamic height

  const canvas=document.getElementById("canvas");
  canvas.width=800;
  canvas.height=height;

  const ctx=canvas.getContext("2d");

  drawPaper(ctx,height);

  let x=90;
  let y=90;

  lines.forEach(line=>{

    line=line.trim();
    if(!line){ y+=18; return; }

    // code
    if(isCode(line)){
      ctx.font="18px monospace";
      ctx.fillStyle="black";
      ctx.fillText(line,x,y);
      y+=26;
      return;
    }

    // heading
    if(isHeading(line)){
      ctx.font="bold 20px Dancing Script";
      ctx.fillStyle="#111";
      ctx.fillText(line,x,y);

      let w=ctx.measureText(line).width;
      drawUnderline(ctx,x,y,w);

      y+=26;
    }

    // question
    else if(isQuestion(line)){
      ctx.font="bold 19px Dancing Script";
      ctx.fillStyle="#111";
      ctx.fillText("Q. "+line,x,y);
      y+=24;
    }

    // answer
    else{
      ctx.font="18px Dancing Script";

      let words=line.split(" ");
      let temp="";

      words.forEach(word=>{
        let test=temp+word+" ";
        let w=ctx.measureText(test).width;

        if(w>650){
          ctx.save();
          ctx.rotate((Math.random()-0.5)*0.01); // slight tilt
          ctx.fillStyle=`rgb(0,0,${140+Math.random()*30})`;
          ctx.fillText(temp,x,y);
          ctx.restore();

          temp=word+" ";
          y+=24;
        }else{
          temp=test;
        }
      });

      ctx.save();
      ctx.rotate((Math.random()-0.5)*0.01);
      ctx.fillStyle=`rgb(0,0,${140+Math.random()*30})`;
      ctx.fillText(temp,x,y);
      ctx.restore();

      y+=28;
    }

  });
}

// download image
function downloadImage(){
  const canvas=document.getElementById("canvas");
  const link=document.createElement("a");
  link.download="notes.png";
  link.href=canvas.toDataURL();
  link.click();
}

// download pdf
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const canvas=document.getElementById("canvas");
  const img = canvas.toDataURL("image/png");

  pdf.addImage(img,'PNG',10,10,190,280);
  pdf.save("notes.pdf");
}

</script>

</body>
</html>
