<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Handwritten Generator</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <!-- html2pdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
      padding: 20px;
    }

    textarea {
      width: 80%;
      height: 120px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }

    /* PAPER */
    .paper {
      width: 800px;
      height: 500px;
      margin: 20px auto;
      padding: 40px;
      overflow-y: auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);

      font-family: 'Great Vibes', cursive;
      font-size: 22px;
      line-height: 40px;
      text-align: left;

      background-image: linear-gradient(#ccc 1px, transparent 1px);
      background-size: 100% 40px;
    }

    /* OLD PAPER */
    .old-paper {
      background: #fdf6e3;
      background-image: 
        linear-gradient(#d6c7a1 1px, transparent 1px),
        radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size: 100% 40px, 3px 3px;
    }

    .white-paper {
      background: #fff;
    }

    .ruled-paper {
      background-image: linear-gradient(#ccc 1px, transparent 1px);
      background-size: 100% 40px;
    }

    .page-number {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: gray;
    }

  </style>
</head>

<body>

  <h2>✍️ Handwritten Generator</h2>

  <textarea id="inputText" placeholder="Enter your long answer here..."></textarea><br>

  <button onclick="setPaper('ruled')">Ruled</button>
  <button onclick="setPaper('white')">White</button>
  <button onclick="setPaper('old')">Old Paper</button><br>

  <button onclick="generate()">Generate</button>
  <button onclick="downloadPDF()">Download PDF</button>

  <div class="paper ruled-paper" id="paper"></div>

  <script>
    let currentStyle = "ruled";

    function setPaper(type) {
      currentStyle = type;
      const paper = document.getElementById("paper");

      paper.classList.remove("ruled-paper", "white-paper", "old-paper");

      if (type === "ruled") paper.classList.add("ruled-paper");
      if (type === "white") paper.classList.add("white-paper");
      if (type === "old") paper.classList.add("old-paper");
    }

    function generate() {
      const text = document.getElementById("inputText").value;
      const paper = document.getElementById("paper");

      let formatted = text.replace(/\n/g, "<br>");
      paper.innerHTML = formatted;
    }

    function downloadPDF() {
      const element = document.getElementById("paper");

      // Expand fully for PDF
      element.style.height = "auto";

      const opt = {
        margin: 10,
        filename: 'answer.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'] }
      };

      html2pdf().set(opt).from(element).save().then(() => {
        // Reset height after PDF
        element.style.height = "500px";
      });
    }
  </script>

</body>
</html>
