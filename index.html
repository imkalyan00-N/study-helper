<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Record Generator V5</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Homemade+Apple&family=Shadows+Into+Light&family=Reenie+Beanie&family=Nanum+Pen+Script&family=Just+Me+Again+Down+Here&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-gap: 34.5px;
            --ink-color: #1a3c8e; /* Default Blue */
        }

        body { background-color: #2c3e50; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Controls */
        .controls { background: white; padding: 25px; border-radius: 15px; width: 95%; max-width: 650px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); text-align: center; }
        textarea { width: 100%; height: 120px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-size: 16px; box-sizing: border-box; }
        
        .setting-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .setting-item { display: flex; flex-direction: column; align-items: flex-start; }
        label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 4px; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; background: #f9f9f9; cursor: pointer; }

        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }

        /* Paper Styling */
        #paper-wrapper { display: none; margin-top: 10px; }
        
        #paper {
            width: 210mm; 
            min-height: 297mm; 
            background: #fff;
            position: relative;
            padding: 44px 50px 40px 75px; 
            box-sizing: border-box;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .ruled-lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(#e1eef7 1.5px, transparent 1.5px);
            background-size: 100% var(--line-gap);
            background-position: 0 40px;
            pointer-events: none;
            z-index: 1;
        }

        .margin-red {
            position: absolute;
            top: 0; left: 65px;
            width: 1.5px; height: 100%;
            background-color: #ffb3b3;
            z-index: 2;
        }

        #output {
            position: relative;
            z-index: 3;
            font-size: 26px;
            line-height: var(--line-gap);
            white-space: pre-wrap;
            color: var(--ink-color);
            /* Perfect Touch Alignment */
            transform: translateY(11px); 
            filter: blur(0.2px); /* Ink effect */
        }

        /* Paper Variants */
        .paper-white { background-image: none !important; }
        .paper-rough { background-color: #fdf6e3 !important; background-image: none !important; }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="margin:0 0 15px 0; color: #2c3e50;">Handwritten Pro V5</h2>
        <textarea id="userInput" placeholder="Matter ikkada type chey bro..."></textarea>
        
        <div class="setting-group">
            <div class="setting-item">
                <label>Writing Style</label>
                <select id="fontStyle" onchange="updateStyle()">
                    <option value="'Caveat', cursive">Clean Pen</option>
                    <option value="'Homemade Apple', cursive">Messy Cursive</option>
                    <option value="'Shadows Into Light', cursive">Sharp Pen</option>
                    <option value="'Reenie Beanie', cursive">Fast Writing</option>
                    <option value="'Nanum Pen Script', cursive">Bold Marker</option>
                    <option value="'Just Me Again Down Here', cursive">Thin Sketch</option>
                </select>
            </div>

            <div class="setting-item">
                <label>Ink Color</label>
                <select id="inkColor" onchange="updateStyle()">
                    <option value="#1a3c8e">Blue Ink</option>
                    <option value="#222222">Black Ink</option>
                    <option value="#c0392b">Red Ink</option>
                </select>
            </div>

            <div class="setting-item">
                <label>Paper Type</label>
                <select id="paperType" onchange="updateStyle()">
                    <option value="ruled">Ruled Paper</option>
                    <option value="white">Plain White</option>
                    <option value="rough">Old Record</option>
                </select>
            </div>
        </div>

        <button class="btn btn-gen" onclick="generate()">Generate Note</button>
        <button class="btn btn-pdf" onclick="savePDF()">Download PDF</button>
    </div>

    <div id="paper-wrapper">
        <div id="paper">
            <div id="lines" class="ruled-lines"></div>
            <div id="margin" class="margin-red"></div>
            <div id="output"></div>
        </div>
    </div>

<script>
    function updateStyle() {
        const output = document.getElementById('output');
        const paper = document.getElementById('paper');
        const lines = document.getElementById('lines');
        const margin = document.getElementById('margin');

        // Update Font & Ink
        output.style.fontFamily = document.getElementById('fontStyle').value;
        document.documentElement.style.setProperty('--ink-color', document.getElementById('inkColor').value);

        // Update Paper
        const pType = document.getElementById('paperType').value;
        lines.style.display = pType === 'ruled' ? 'block' : 'none';
        margin.style.display = pType === 'ruled' ? 'block' : 'none';
        
        if(pType === 'white') paper.style.backgroundColor = '#fff';
        if(pType === 'rough') paper.style.backgroundColor = '#fdf6e3';
        if(pType === 'ruled') paper.style.backgroundColor = '#fff';
    }

    function generate() {
        const text = document.getElementById('userInput').value;
        if(!text) return alert("Write something bro!");
        document.getElementById('output').innerText = text;
        document.getElementById('paper-wrapper').style.display = 'block';
        updateStyle();
    }

    function savePDF() {
        const element = document.getElementById('paper');
        const opt = {
            margin: 0,
            filename: 'Handwritten_Note_V5.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 3, useCORS: true, logging: false },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid-all' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
