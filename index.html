<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwriter FINAL PERFECT V14</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
    --line-height: 34px;
}

body {
    background: #2c3e50;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    margin: 0;
}

.controls {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 95%;
    max-width: 600px;
    margin-bottom: 20px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
}

/* 🔥 NEW WRAPPER LOGIC */
#paper-container {
    display: none;
    width: 210mm;
}

.paper-page {
    width: 210mm;
    height: 297mm;
    background: #fff;
    position: relative;
    padding: 40px 40px 10px 75px; 
    box-sizing: border-box;
    page-break-after: always; /* Forces new page in PDF */
}

.lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: linear-gradient(
        transparent calc(var(--line-height) - 1px),
        #b5c9e8 1px
    );
    background-size: 100% var(--line-height);
    background-position: 0 40px;
}

.margin {
    position: absolute;
    left: 65px;
    width: 1px;
    height: 100%;
    background: red;
    z-index: 5;
}

.text {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: #1a3c8e;
    line-height: var(--line-height);
    white-space: pre-wrap;
    transform: translateY(7px);
    position: relative;
    z-index: 10;
}
</style>
</head>

<body>

<div class="controls">
<h2>Handwriter PERFECT V14 ✅</h2>
<textarea id="input" placeholder="Type your answer..."></textarea><br><br>
<button onclick="generate()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="paper-container"></div>

<script>
function generate() {
    const text = document.getElementById("input").value;
    if(!text) return alert("Text rayi bro!");

    const container = document.getElementById("paper-container");
    container.style.display = "block";
    container.innerHTML = ""; // Clear old pages

    const lines = text.split('\n');
    const linesPerPage = 24; // 🔥 Exactly 24 lines to fill the page
    
    for (let i = 0; i < Math.ceil(lines.length / linesPerPage); i++) {
        const page = document.createElement("div");
        page.className = "paper-page";
        
        const pageLines = lines.slice(i * linesPerPage, (i + 1) * linesPerPage).join('\n');
        
        page.innerHTML = `
            <div class="lines"></div>
            <div class="margin"></div>
            <div class="text">${pageLines}</div>
        `;
        container.appendChild(page);
    }
}

function downloadPDF() {
    const element = document.getElementById("paper-container");
    if(!element.innerHTML) return alert("Generate kottu bro!");

    html2pdf().set({
        margin: 0,
        filename: "handwritten_fixed.pdf",
        image: { type: 'jpeg', quality: 1.0 },
        html2canvas: { scale: 3, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(element).save();
}
</script>

</body>
</html>
