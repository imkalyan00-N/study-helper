<!DOCTYPE html>
<html>
<head>
  <title>Handwritten Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      text-align:center;
      background:#ececec;
      font-family:sans-serif;
    }

    textarea {
      width:320px;
      height:120px;
      margin:10px;
    }

    canvas {
      margin-top:20px;
      box-shadow:0 0 15px rgba(0,0,0,0.3);
      border-radius:10px;
    }

    button {
      padding:10px;
      margin:5px;
    }
  </style>
</head>

<body>

<h2>Handwritten Notes ✍️</h2>

<button onclick="setPaper('ruled')">Ruled</button>
<button onclick="setPaper('white')">White</button>
<button onclick="setPaper('soft')">Soft Paper</button>

<br>

<textarea id="text" placeholder="Type your answer..."></textarea><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadImage()">Download Image</button>

<br>
<canvas id="canvas" width="800" height="1000"></canvas>

<script>

let paperType = "ruled";

function setPaper(type){
  paperType = type;
}

function drawPaper(ctx){

  // base
  if(paperType === "white"){
    ctx.fillStyle = "#ffffff";
  }
  else if(paperType === "soft"){
    ctx.fillStyle = "#fdfaf3";
  }
  else{
    ctx.fillStyle = "#fdfcf7";
  }

  ctx.fillRect(0,0,800,1000);

  // ruled lines
  if(paperType === "ruled"){
    ctx.strokeStyle="#cce0ff";
    for(let i=100;i<1000;i+=40){
      ctx.beginPath();
      ctx.moveTo(0,i);
      ctx.lineTo(800,i);
      ctx.stroke();
    }

    // margin line
    ctx.strokeStyle="red";
    ctx.beginPath();
    ctx.moveTo(70,0);
    ctx.lineTo(70,1000);
    ctx.stroke();
  }
}

function generate(){

  const text = document.getElementById("text").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,800,1000);

  drawPaper(ctx);

  ctx.fillStyle="#1e3a8a";
  ctx.font="26px 'Dancing Script'";

  let marginLeft = 90;   // margin respect
  let lineHeight = 40;
  let maxWidth = 650;

  let x = marginLeft;
  let y = 120;

  let words = text.split(" ");

  words.forEach(word => {

    let wordWidth = ctx.measureText(word).width;

    if(x + wordWidth > marginLeft + maxWidth){
      x = marginLeft;
      y += lineHeight;
    }

    ctx.fillText(word, x, y);

    x += wordWidth + 10;

  });

}

// download
function downloadImage(){
  const canvas = document.getElementById("canvas");
  const link = document.createElement("a");
  link.download = "notes.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
