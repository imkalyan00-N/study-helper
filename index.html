<!DOCTYPE html>
<html>
<head>
  <title>Real Handwritten Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      text-align:center;
      background:#e5e5e5;
      font-family:sans-serif;
    }

    textarea {
      width:320px;
      height:120px;
      margin:10px;
    }

    .paper-container {
      height:600px;
      overflow-y:auto;
      display:flex;
      justify-content:center;
    }

    canvas {
      margin-top:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
      border-radius:12px;
    }

    button {
      padding:10px;
      margin:5px;
    }
  </style>
</head>

<body>

<h2>Real Handwritten Notes ✍️</h2>

<button onclick="setPaper('ruled')">Ruled</button>
<button onclick="setPaper('white')">White</button>
<button onclick="setPaper('soft')">Old Paper</button>

<br>

<textarea id="text" placeholder="Type your answer..."></textarea><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>

<div class="paper-container">
  <canvas id="canvas" width="800" height="2000"></canvas>
</div>

<script>

let paperType = "ruled";

function setPaper(type){
  paperType = type;
}

// 👉 SAME PAPER DESIGN (unchanged)
function drawPaper(ctx, h){

  ctx.fillStyle = (paperType==="soft") ? "#f6f1e7" :
                  (paperType==="white") ? "#fff" : "#fbfbf5";

  ctx.fillRect(0,0,800,h);

  if(paperType==="ruled"){
    ctx.strokeStyle="rgba(150,180,255,0.5)";
    for(let i=100;i<h;i+=40){
      ctx.beginPath();
      ctx.moveTo(0,i);
      ctx.lineTo(800,i);
      ctx.stroke();
    }

    ctx.strokeStyle="rgba(255,0,0,0.6)";
    ctx.beginPath();
    ctx.moveTo(70,0);
    ctx.lineTo(70,h);
    ctx.stroke();
  }
}

// 👉 SAME WRITING STYLE (TOUCH CHEYYALEDHU)
function generate(){

  const text = document.getElementById("text").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let lines = text.split(" ").length;
  let height = Math.max(2000, lines * 30);

  canvas.height = height;

  ctx.clearRect(0,0,800,height);
  drawPaper(ctx, height);

  ctx.fillStyle="rgba(30,58,138,0.95)";
  ctx.font="26px 'Dancing Script'";

  let marginLeft = 90;
  let lineHeight = 42;
  let maxWidth = 650;

  let x = marginLeft;
  let y = 120;

  let words = text.split(" ");

  words.forEach(word => {

    let wordWidth = ctx.measureText(word).width;

    if(x + wordWidth > marginLeft + maxWidth){
      x = marginLeft;
      y += lineHeight;
    }

    // 👉 SAME natural tilt
    let tilt = (Math.random()*2 -1) * 0.05;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(tilt);
    ctx.fillText(word,0,0);
    ctx.restore();

    x += wordWidth + 10;

  });

}

// 🔥 PERFECT MULTI PAGE PDF (NO CUT)
function downloadPDF(){

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");

  const canvas = document.getElementById("canvas");

  const imgData = canvas.toDataURL("image/png");

  const imgWidth = 210;
  const pageHeight = 297;

  const imgHeight = canvas.height * imgWidth / canvas.width;

  let heightLeft = imgHeight;
  let position = 0;

  pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;

  while(heightLeft > 0){
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  pdf.save("notes.pdf");
}

</script>

</body>
</html>
