<!DOCTYPE html>
<html>
<head>
  <title>Smart Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body { text-align:center; background:#ececec; font-family:sans-serif; }
    textarea { width:320px; height:130px; margin-top:15px; display:none; }
    canvas { margin-top:20px; background:#fbfbf5; box-shadow:0 0 15px rgba(0,0,0,0.25); }
    button { margin:8px; padding:10px; }
  </style>
</head>

<body>

<h2>Handwritten Notes ✍️</h2>

<button onclick="selectPaper('ruled')">Ruled</button>
<button onclick="selectPaper('white')">White</button>

<textarea id="text"></textarea><br>

<button onclick="generate()">Generate</button>

<canvas id="canvas" width="800" height="1000"></canvas>

<script>

let paperType="ruled";

function selectPaper(type){
  paperType=type;
  document.getElementById("text").style.display="block";
}

// ✅ BETTER HEADING DETECTION
function isHeading(line){
  return line === line.toUpperCase() && line.includes(" ") && line.length < 40;
}

// ✅ STRICT QUESTION DETECTION
function isQuestion(line){
  return line.trim().endsWith("?");
}

// ❌ CODE DETECTION
function isCode(line){
  return /[{}();=<>]/.test(line);
}

// underline
function drawUnderline(ctx,x,y,w){
  ctx.lineWidth=1;
  ctx.beginPath();
  for(let i=0;i<=w;i+=5){
    let wave=Math.sin(i*0.04)*1;
    ctx.lineTo(x+i,y+6+wave);
  }
  ctx.stroke();
}

// paper
function drawPaper(ctx){
  ctx.fillStyle="#fbfbf5";
  ctx.fillRect(0,0,800,1000);

  if(paperType==="ruled"){
    ctx.strokeStyle="rgba(100,150,255,0.25)";
    for(let i=60;i<1000;i+=30){
      ctx.beginPath();
      ctx.moveTo(0,i);
      ctx.lineTo(800,i);
      ctx.stroke();
    }

    ctx.strokeStyle="rgba(255,0,0,0.4)";
    ctx.beginPath();
    ctx.moveTo(70,0);
    ctx.lineTo(70,1000);
    ctx.stroke();
  }
}

// MAIN
function generate(){
  const text=document.getElementById("text").value;
  const lines=text.split("\n");

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  ctx.clearRect(0,0,800,1000);
  drawPaper(ctx);

  let x=90;
  let y=90;

  lines.forEach(line=>{
    line=line.trim();
    if(!line){ y+=18; return; }

    // ❌ code line → normal
    if(isCode(line)){
      ctx.font="20px monospace";
      ctx.fillStyle="black";
      ctx.fillText(line,x,y);
      y+=26;
      return;
    }

    // ✔ heading (small)
    if(isHeading(line)){
      ctx.font="bold 22px Dancing Script";
      ctx.fillStyle="#111";
      ctx.fillText(line,x,y);

      let w=ctx.measureText(line).width;
      drawUnderline(ctx,x,y,w);

      y+=28;
    }

    // ✔ question (small)
    else if(isQuestion(line)){
      ctx.font="bold 21px Dancing Script";
      ctx.fillStyle="#111";
      ctx.fillText("Q. "+line,x,y);
      y+=26;
    }

    // ✔ answer
    else{
      ctx.font="20px Dancing Script";

      let words=line.split(" ");
      let temp="";

      words.forEach(word=>{
        let test=temp+word+" ";
        let w=ctx.measureText(test).width;

        if(w>650){
          ctx.fillStyle=`rgb(0,0,${150+Math.random()*20})`;
          ctx.fillText(temp,x,y);

          temp=word+" ";
          y+=24;
        }else{
          temp=test;
        }
      });

      ctx.fillStyle=`rgb(0,0,${150+Math.random()*20})`;
      ctx.fillText(temp,x,y);
      y+=28;
    }

  });

}

</script>

</body>
</html>
