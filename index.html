<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Pro V9 - Pixel Perfect</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Shadows+Into+Light&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-height: 35.45px;
            --ink-color: #1a3c8e;
        }

        body { background-color: #1e272e; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .controls { background: white; padding: 25px; border-radius: 15px; width: 95%; max-width: 700px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; z-index: 100; }
        textarea { width: 100%; height: 150px; padding: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; resize: vertical; }

        .btn { padding: 14px 28px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; margin: 5px; text-transform: uppercase; }
        .btn-gen { background: #05c46b; }
        .btn-pdf { background: #0fbcf9; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* The Container that holds all pages */
        #pdf-render-area {
            display: flex;
            flex-direction: column;
            gap: 0; /* No gaps between pages in PDF */
            width: 210mm;
        }

        .paper-page {
            width: 210mm;
            height: 297mm;
            background-color: white;
            position: relative;
            box-sizing: border-box;
            padding: 44px 50px 40px 75px; 
            overflow: hidden;
            page-break-after: always; /* Force PDF to split here */
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* The Lines Background */
        .ruled-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(#d1e2ff 1.5px, transparent 1.5px);
            background-size: 100% var(--line-height);
            background-position: 0 42px;
            pointer-events: none;
        }

        /* Red Margin Line */
        .margin-red {
            position: absolute;
            top: 0; left: 68px;
            width: 2px; height: 100%;
            border-left: 1.5px solid #ffb3b3;
            background-color: transparent;
        }

        /* The Actual Text */
        .handwritten-text {
            position: relative;
            z-index: 5;
            font-size: 25.5px; /* Size adjusted to sit on line */
            line-height: var(--line-height);
            color: var(--ink-color);
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            padding: 0;
            letter-spacing: 0.5px;
        }

        /* Mobile Viewport Fix */
        @media screen and (max-width: 210mm) {
            #pdf-render-area { transform: scale(0.45); transform-origin: top center; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="margin:0 0 10px 0; color:#2d3436;">Record Note Generator (V9 Fix)</h2>
        <textarea id="rawInput" placeholder="Paste your experiment/matter here..."></textarea>
        
        <div style="margin-bottom: 20px;">
            <select id="fontType" style="padding:10px; border-radius:5px;">
                <option value="'Caveat', cursive">Style 1: Clean</option>
                <option value="'Shadows Into Light', cursive">Style 2: Sharp</option>
                <option value="'Nanum Pen Script', cursive">Style 3: Marker</option>
            </select>
            <select id="penColor" style="padding:10px; border-radius:5px;">
                <option value="#1a3c8e">Blue Ink</option>
                <option value="#2d3436">Black Ink</option>
            </select>
        </div>

        <button class="btn btn-gen" onclick="generateVisuals()">Generate Preview</button>
        <button class="btn btn-pdf" onclick="saveAsPDF()">Download PDF</button>
    </div>

    <div id="pdf-render-area"></div>

<script>
    function generateVisuals() {
        const text = document.getElementById('rawInput').value;
        const renderArea = document.getElementById('pdf-render-area');
        const font = document.getElementById('fontType').value;
        const color = document.getElementById('penColor').value;

        if(!text.trim()) { alert("Please paste some content!"); return; }

        renderArea.innerHTML = ''; // Reset

        // 1. Process text to handle long paragraphs by wrapping them into lines
        // 2. We use a fixed line count to force a new page
        const lines = text.split('\n');
        let linesPerPage = 23; 
        
        let totalPages = Math.ceil(lines.length / linesPerPage) || 1;

        for (let i = 0; i < totalPages; i++) {
            const page = document.createElement('div');
            page.className = 'paper-page';
            page.style.fontFamily = font;

            // Extract exactly 23 lines for this page
            const startIdx = i * linesPerPage;
            const endIdx = startIdx + linesPerPage;
            const pageContent = lines.slice(startIdx, endIdx).join('\n');

            page.innerHTML = `
                <div class="ruled-background"></div>
                <div class="margin-red"></div>
                <div class="handwritten-text" style="color: ${color}">${pageContent}</div>
            `;
            renderArea.appendChild(page);
        }
        
        window.scrollTo({ top: renderArea.offsetTop - 50, behavior: 'smooth' });
    }

    function saveAsPDF() {
        const element = document.getElementById('pdf-render-area');
        if(!element.innerHTML) { alert("Please generate preview first!"); return; }

        const options = {
            margin: 0,
            filename: 'Record_Fixed_V9.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { 
                scale: 2, 
                useCORS: true,
                logging: false,
                letterRendering: true
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(options).from(element).save();
    }
</script>

</body>
</html>
