<!DOCTYPE html>
<html>
<head>
  <title>Real Handwriting ✍️</title>

  <style>
    body {
      text-align: center;
      background: #ececec;
      font-family: sans-serif;
    }

    textarea {
      width: 320px;
      height: 120px;
      margin: 10px;
    }

    canvas {
      background: #fdfcf7;
      margin-top: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>Your Handwriting Generator ✍️</h2>

<textarea id="text" placeholder="Type your text..."></textarea><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadImage()">Download Image</button>

<br>
<canvas id="canvas" width="800" height="1000"></canvas>

<script>

// ✅ IMAGE LINK (ALREADY SET)
const img = new Image();
img.src = "https://raw.githubusercontent.com/imkalyan00-N/study-helper/main/handwriting.png";

// basic mapping
const map = {
  a:[0,0], b:[30,0], c:[60,0], d:[90,0],
  e:[120,0], f:[150,0], g:[180,0], h:[210,0],
  i:[240,0], j:[270,0], k:[300,0], l:[330,0],
  m:[360,0], n:[390,0], o:[420,0], p:[450,0],
  q:[480,0], r:[510,0], s:[540,0], t:[570,0],
  u:[600,0], v:[630,0], w:[660,0], x:[690,0],
  y:[720,0], z:[750,0]
};

function generate(){

  const text = document.getElementById("text").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,800,1000);

  // paper
  ctx.fillStyle="#fdfcf7";
  ctx.fillRect(0,0,800,1000);

  let x = 60;
  let y = 100;

  text.split("").forEach(ch=>{

    if(ch === " "){
      x += 20;
      return;
    }

    let pos = map[ch.toLowerCase()];

    if(pos){
      ctx.drawImage(
        img,
        pos[0], pos[1], 30, 40,
        x, y + (Math.random()*4-2),
        28, 38
      );

      x += 26 + Math.random()*2;
    }

    if(x > 700){
      x = 60;
      y += 50;
    }

  });

}

// download
function downloadImage(){
  const canvas = document.getElementById("canvas");
  const link = document.createElement("a");
  link.download = "handwriting.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
