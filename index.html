<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwriter Pro Final</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
    --line-height: 34px;
}

body {
    background: #2c3e50;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* UI */
.controls {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 95%;
    max-width: 600px;
    margin-bottom: 20px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
}

/* SCROLL PREVIEW */
#paper-wrapper {
    display: none;
    max-height: 80vh;
    overflow-y: auto;
}

/* PAGE */
.page {
    width: 210mm;
    height: 297mm;
    background: #fff;
    position: relative;
    margin-bottom: 20px;
    box-sizing: border-box;
    page-break-after: always;
}

/* LINES */
.lines {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: linear-gradient(
        transparent calc(var(--line-height) - 1px),
        #b5c9e8 1px
    );
    background-size: 100% var(--line-height);
}

/* MARGIN */
.margin {
    position: absolute;
    left: 65px;
    width: 1px;
    height: 100%;
    background: red;
}

/* TEXT */
.text {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: #1a3c8e;
    line-height: var(--line-height);
    padding: 40px 40px 0 75px;
    white-space: pre-wrap;
}

/* LINE */
.handwriting-line {
    display: block;
}
</style>
</head>

<body>

<div class="controls">
    <h2>Handwriter Perfect ✅</h2>
    <textarea id="input" placeholder="Type or paste your content..."></textarea><br><br>
    <button onclick="generate()">Preview</button>
    <button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="paper-wrapper"></div>

<script>
function generate() {
    const text = document.getElementById("input").value;
    if (!text) return alert("Matter rayi bro!");

    const wrapper = document.getElementById("paper-wrapper");
    wrapper.innerHTML = "";
    wrapper.style.display = "block";

    const lines = text.split("\n");

    const MAX_LINES = 31; // 🔥 perfect fit
    let lineCount = 0;
    let page = createPage();

    lines.forEach(line => {

        if (lineCount >= MAX_LINES) {
            page = createPage();
            lineCount = 0;
        }

        const span = document.createElement("span");
        span.className = "handwriting-line";
        span.innerHTML = line || "&nbsp;";

        page.querySelector(".text").appendChild(span);
        lineCount++;
    });

    function createPage() {
        const page = document.createElement("div");
        page.className = "page";

        page.innerHTML = `
            <div class="lines"></div>
            <div class="margin"></div>
            <div class="text"></div>
        `;

        wrapper.appendChild(page);
        return page;
    }
}

function downloadPDF() {
    const element = document.getElementById("paper-wrapper");

    const opt = {
        margin: 0,
        filename: "handwritten.pdf",
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 3 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
