<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Pro V5 - Image Export</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Homemade+Apple&family=Shadows+Into+Light&family=Reenie+Beanie&family=Nanum+Pen+Script&family=Just+Me+Again+Down+Here&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --line-height: 34.5px;
            --ink-color: #1a3c8e;
        }

        body { background-color: #2c3e50; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .controls { background: white; padding: 25px; border-radius: 12px; width: 95%; max-width: 650px; margin-bottom: 25px; text-align: center; }
        textarea { width: 100%; height: 100px; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }

        .setting-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 15px; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; }

        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin: 5px; }
        .btn-gen { background: #27ae60; }
        .btn-img { background: #e67e22; } /* Orange for Image Download */

        #paper-wrapper { display: none; }

        #paper {
            width: 210mm;
            min-height: 297mm;
            background-color: #fff;
            position: relative;
            padding: 41px 50px 40px 75px; 
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .ruled-lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(#e1eef7 1.5px, transparent 1.5px);
            background-size: 100% var(--line-height);
            background-position: 0 38px;
            pointer-events: none;
            z-index: 1;
        }

        .margin-red {
            position: absolute;
            top: 0; left: 65px;
            width: 1.5px; height: 100%;
            background-color: #ffb3b3;
            z-index: 2;
        }

        #output {
            position: relative;
            z-index: 3;
            font-size: 26px;
            line-height: var(--line-height);
            white-space: pre-wrap;
            color: var(--ink-color);
            margin-top: 5px; 
            filter: blur(0.15px);
        }

        .paper-white .ruled-lines, .paper-white .margin-red { display: none; }
        .paper-rough { background-color: #fdf6e3 !important; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Handwriter Image Export ✅</h2>
        <textarea id="userInput" placeholder="Type here..."></textarea>
        
        <div class="setting-group">
            <select id="fontStyle" onchange="update()">
                <option value="'Caveat', cursive">Clean Pen</option>
                <option value="'Homemade Apple', cursive">Messy Cursive</option>
                <option value="'Shadows Into Light', cursive">Sharp Pen</option>
                <option value="'Reenie Beanie', cursive">Fast Writing</option>
                <option value="'Nanum Pen Script', cursive">Bold Marker</option>
                <option value="'Just Me Again Down Here', cursive">Thin Sketch</option>
            </select>

            <select id="inkColor" onchange="update()">
                <option value="#1a3c8e">Blue Ink</option>
                <option value="#222222">Black Ink</option>
                <option value="#c0392b">Red Ink</option>
            </select>

            <select id="paperType" onchange="update()">
                <option value="ruled">Ruled Paper</option>
                <option value="white">White Paper</option>
                <option value="rough">Rough Paper</option>
            </select>
        </div>

        <button class="btn btn-gen" onclick="generate()">Generate Preview</button>
        <button class="btn btn-img" onclick="downloadImage()">Download Image (PNG)</button>
    </div>

    <div id="paper-wrapper">
        <div id="paper">
            <div id="lines" class="ruled-lines"></div>
            <div id="margin" class="margin-red"></div>
            <div id="output"></div>
        </div>
    </div>

<script>
    function update() {
        const output = document.getElementById('output');
        const paper = document.getElementById('paper');
        const pType = document.getElementById('paperType').value;
        
        output.style.fontFamily = document.getElementById('fontStyle').value;
        document.documentElement.style.setProperty('--ink-color', document.getElementById('inkColor').value);

        paper.className = pType === 'white' ? 'paper-white' : (pType === 'rough' ? 'paper-rough' : '');
    }

    function generate() {
        const text = document.getElementById('userInput').value;
        if(!text) return alert("Text rayi bro!");
        document.getElementById('output').innerText = text;
        document.getElementById('paper-wrapper').style.display = 'block';
        update();
    }

    function downloadImage() {
        const element = document.getElementById('paper');
        if (document.getElementById('paper-wrapper').style.display === 'none') {
            return alert("First generate preview!");
        }

        html2canvas(element, {
            scale: 3, // High resolution
            useCORS: true,
            backgroundColor: null
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Handwritten_Note.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>

</body>
</html>
