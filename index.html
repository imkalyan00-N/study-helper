<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Record Note Generator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-height: 34px; /* Adjust this to match your image lines */
            --ink-color: #1a3a82; /* Deep Blue Ballpoint Pen Color */
        }

        body { background-color: #555; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .controls { background: #fff; padding: 20px; border-radius: 8px; width: 90%; max-width: 500px; margin-bottom: 20px; text-align: center; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 10px; }
        .btn { padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; color: white; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }

        /* Paper Container */
        #record-paper {
            width: 210mm; 
            min-height: 297mm; 
            background: #ffffff;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            padding: 60px 50px 40px 85px; /* Margin adjust */
            box-sizing: border-box;
            display: none;
        }

        /* Rule Lines Styling */
        .lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(transparent 97%, #cfd9e8 3%);
            background-size: 100% var(--line-height);
            background-attachment: local;
            pointer-events: none;
            z-index: 1;
        }

        /* Double Red Margin Lines */
        .margin-red {
            position: absolute;
            top: 0; left: 70px;
            width: 3px; height: 100%;
            border-left: 1px solid #ff9999;
            border-right: 1px solid #ff9999;
            z-index: 2;
        }

        /* Text Content */
        .content {
            font-family: 'Caveat', cursive;
            font-size: 24px;
            color: var(--ink-color);
            line-height: var(--line-height);
            white-space: pre-wrap;
            position: relative;
            z-index: 3;
            /* Moves text to the MIDDLE of the lines */
            padding-top: 4px; 
        }

        @media print {
            body { background: none; padding: 0; }
            .controls { display: none; }
            #record-paper { display: block; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Record Note Generator</h2>
        <textarea id="inputText" placeholder="Enter Experiment details here..."></textarea>
        <br>
        <button class="btn btn-gen" onclick="generate()">Generate Note</button>
        <button class="btn btn-pdf" onclick="savePDF()">Download PDF</button>
    </div>

    <div id="record-paper">
        <div class="lines"></div>
        <div class="margin-red"></div>
        <div id="outputContent" class="content"></div>
    </div>

<script>
    function generate() {
        const text = document.getElementById('inputText').value;
        if(!text) return alert("Text enter chey bro!");
        
        document.getElementById('outputContent').innerText = text;
        document.getElementById('record-paper').style.display = 'block';
    }

    function savePDF() {
        const element = document.getElementById('record-paper');
        const opt = {
            margin: 0,
            filename: 'Record_Note.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
