<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwriter - Paper Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Homemade+Apple&family=Shadows+Into+Light&family=Reenie+Beanie&family=Nanum+Pen+Script&family=Just+Me+Again+Down+Here&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --ink-color: #1a3c8e;
        }

        body { background-color: #2c3e50; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .controls { background: white; padding: 25px; border-radius: 12px; width: 95%; max-width: 650px; margin-bottom: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        textarea { width: 100%; height: 100px; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }

        .setting-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 15px; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; }

        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin: 5px; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }
        .btn-img { background: #e67e22; }

        #paper-wrapper { display: none; width: 210mm; }

        #paper {
            width: 210mm;
            min-height: 297mm; /* Minimum A4 height */
            height: auto;      /* 🔥 Allows paper to grow down */
            background-color: #fff;
            position: relative;
            padding: 50px 60px; 
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 3 Paper Types */
        .paper-pure-white { background-color: #ffffff !important; }
        .paper-cream { background-color: #fdf6e3 !important; }
        .paper-grey { background-color: #f4f4f4 !important; }

        #output {
            position: relative;
            z-index: 3;
            font-size: 26px;
            line-height: 1.5;
            white-space: pre-wrap;
            color: var(--ink-color);
            filter: blur(0.15px);
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Handwriter - Plain Paper Edition ✅</h2>
        <textarea id="userInput" placeholder="Ikkada matter paste chey bro..."></textarea>
        
        <div class="setting-group">
            <select id="fontStyle" onchange="update()">
                <option value="'Caveat', cursive">Clean Pen</option>
                <option value="'Homemade Apple', cursive">Messy Cursive</option>
                <option value="'Shadows Into Light', cursive">Sharp Pen</option>
                <option value="'Reenie Beanie', cursive">Fast Writing</option>
                <option value="'Nanum Pen Script', cursive">Bold Marker</option>
                <option value="'Just Me Again Down Here', cursive">Thin Sketch</option>
            </select>

            <select id="inkColor" onchange="update()">
                <option value="#1a3c8e">Blue Ink</option>
                <option value="#222222">Black Ink</option>
                <option value="#c0392b">Red Ink</option>
            </select>

            <select id="paperType" onchange="update()">
                <option value="paper-pure-white">Pure White Paper</option>
                <option value="paper-cream">Cream/Rough Paper</option>
                <option value="paper-grey">Soft Grey Paper</option>
            </select>
        </div>

        <button class="btn btn-gen" onclick="generate()">Preview</button>
        <button class="btn btn-pdf" onclick="savePDF()">Download PDF</button>
        <button class="btn btn-img" onclick="downloadImage()">Save as Image</button>
    </div>

    <div id="paper-wrapper">
        <div id="paper" class="paper-pure-white">
            <div id="output"></div>
        </div>
    </div>

<script>
    function update() {
        const output = document.getElementById('output');
        const paper = document.getElementById('paper');
        
        output.style.fontFamily = document.getElementById('fontStyle').value;
        document.documentElement.style.setProperty('--ink-color', document.getElementById('inkColor').value);
        
        // Update paper background class
        paper.className = document.getElementById('paperType').value;
    }

    function generate() {
        const text = document.getElementById('userInput').value;
        if(!text) return alert("Matter rayi bro!");
        document.getElementById('output').innerText = text;
        document.getElementById('paper-wrapper').style.display = 'block';
        update();
        window.scrollTo({ top: document.getElementById('paper-wrapper').offsetTop, behavior: 'smooth' });
    }

    function savePDF() {
        const element = document.getElementById('paper');
        html2pdf().set({
            margin: 0,
            filename: 'Handwritten_Document.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    }

    function downloadImage() {
        const element = document.getElementById('paper');
        html2canvas(element, { scale: 2, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Handwritten_Note.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>

</body>
</html>
