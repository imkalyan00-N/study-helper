<!DOCTYPE html>
<html>
<head>
  <title>AI Handwritten Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body{
      text-align:center;
      background:#e5e5e5;
      font-family:sans-serif;
    }

    textarea{
      width:320px;
      height:120px;
      margin:10px;
    }

    canvas{
      margin-top:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
      border-radius:12px;
    }

    button{
      padding:10px;
      margin:5px;
    }
  </style>
</head>

<body>

<h2>AI Handwritten Notes ✍️</h2>

<textarea id="text" placeholder="Type answer..."></textarea><br>

<button onclick="generate()">Generate</button>

<br>
<canvas id="canvas" width="800" height="1000"></canvas>

<script>

// 🔥 AI FUNCTION
async function formatWithAI(input){

  try{

    const res = await axios.post(
      "https://openrouter.ai/api/v1/chat/completions",
      {
        model: "mistralai/mistral-7b-instruct",
        messages: [
          {
            role: "system",
            content: "Convert into exam answer with headings and proper structure."
          },
          {
            role: "user",
            content: input
          }
        ]
      },
      {
        headers: {
          // 🔥 DUMMY KEY ADDED
          "Authorization": "Bearer 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",
          "HTTP-Referer": window.location.href,
          "X-Title": "Handwriting App"
        }
      }
    );

    return res.data.choices[0].message.content;

  }catch(e){
    alert("API error ⚠️");
    console.log(e);
    return input;
  }

}

// 🔥 GENERATE BUTTON
async function generate(){

  const raw = document.getElementById("text").value;

  const formatted = await formatWithAI(raw);

  draw(formatted);
}

// ✍️ HANDWRITING DRAW
function draw(text){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.fillStyle="#fbfbf5";
  ctx.fillRect(0,0,800,1000);

  ctx.font="26px 'Dancing Script'";

  let x=80;
  let y=120;

  let lines = text.split("\n");

  lines.forEach(line=>{

    if(line.trim()===""){
      y+=40;
      return;
    }

    let isHeading = line === line.toUpperCase();

    ctx.fillStyle = isHeading ? "#000" : "#1e3a8a";

    ctx.fillText(line,x,y);

    y+=40;

  });

}

</script>

</body>
</html>
