<!DOCTYPE html>
<html>
<head>
  <title>Handwriting Generator ✍️</title>

  <!-- cursive font -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      text-align:center;
      background:#ececec;
      font-family:sans-serif;
    }

    textarea {
      width:320px;
      height:120px;
      margin:10px;
    }

    canvas {
      background:#fdfcf7;
      margin-top:20px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<h2>Handwriting Generator ✍️</h2>

<textarea id="text"></textarea><br>
<button onclick="generate()">Generate</button>

<canvas id="canvas" width="800" height="1000"></canvas>

<script>

function generate(){

  const text = document.getElementById("text").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,800,1000);

  // paper background
  ctx.fillStyle="#fdfcf7";
  ctx.fillRect(0,0,800,1000);

  // ruled lines
  ctx.strokeStyle="#cce0ff";
  for(let i=80;i<1000;i+=40){
    ctx.beginPath();
    ctx.moveTo(0,i);
    ctx.lineTo(800,i);
    ctx.stroke();
  }

  // margin line
  ctx.strokeStyle="red";
  ctx.beginPath();
  ctx.moveTo(60,0);
  ctx.lineTo(60,1000);
  ctx.stroke();

  // handwriting style
  ctx.fillStyle="#1e3a8a";
  ctx.font="28px 'Dancing Script'";

  let x=80;
  let y=100;

  text.split(" ").forEach(word=>{
    ctx.fillText(word, x, y);

    x += ctx.measureText(word).width + 15;

    if(x > 700){
      x = 80;
      y += 40;
    }
  });

}

</script>

</body>
</html>
