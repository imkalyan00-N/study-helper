<script>
const API_KEY = "AIzaSyDkIuXeWYfHuGaB-Gztoso9rOiD-n8X2Ts"; // 👈 IKKADA ADD CHEYYALI

async function generate() {
  const question = document.getElementById("text").value;

  // STEP 1: Get AI answer
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`,
    {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        contents: [{ parts: [{ text: question }] }]
      })
    }
  );

  const data = await res.json();
  const answer = data.candidates[0].content.parts[0].text;

  // STEP 2: Draw handwriting
  draw(answer);
}

function draw(text) {
  const canvas = document.getElementById("paper");
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // lines
  ctx.strokeStyle = "#d0e0ff";
  for (let y = 40; y < canvas.height; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // margin
  ctx.strokeStyle = "red";
  ctx.beginPath();
  ctx.moveTo(60, 0);
  ctx.lineTo(60, canvas.height);
  ctx.stroke();

  // text
  ctx.fillStyle = "blue";
  ctx.font = "22px cursive";

  let words = text.split(" ");
  let line = "";
  let x = 70;
  let y = 50;
  let maxWidth = 700;

  for (let i = 0; i < words.length; i++) {
    let testLine = line + words[i] + " ";
    let width = ctx.measureText(testLine).width;

    if (width > maxWidth) {
      ctx.fillText(line, x, y);
      line = words[i] + " ";
      y += 40;
    } else {
      line = testLine;
    }
  }

  ctx.fillText(line, x, y);
}
</script>
