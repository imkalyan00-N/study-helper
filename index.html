<!DOCTYPE html>
<html>
<head>
  <title>Realistic Handwriting ✍️</title>

  <!-- Best cursive fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Caveat&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    textarea {
      width: 320px;
      height: 100px;
      margin-top: 20px;
    }

    canvas {
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      background: #fff;
    }
  </style>
</head>

<body>

<h2>Handwritten Notes Generator ✍️</h2>

<textarea id="text" placeholder="Type your answer..."></textarea><br>

<button onclick="generate()">Generate</button>

<br>
<canvas id="canvas" width="800" height="500"></canvas>

<script>
function generate() {
  const text = document.getElementById("text").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Paper
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Lines
  ctx.strokeStyle = "#dcdcdc";
  for (let i = 40; i < canvas.height; i += 32) {
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(canvas.width, i);
    ctx.stroke();
  }

  // Margin line
  ctx.strokeStyle = "red";
  ctx.beginPath();
  ctx.moveTo(60, 0);
  ctx.lineTo(60, canvas.height);
  ctx.stroke();

  // Font
  ctx.font = "28px 'Dancing Script'";
  
  let x = 80;
  let y = 60;

  const words = text.split(" ");

  words.forEach(word => {

    let tilt = (Math.random() - 0.5) * 0.12;
    let yShift = (Math.random() - 0.5) * 4;
    let ink = 120 + Math.random() * 60;

    ctx.save();

    ctx.translate(x, y + yShift);
    ctx.rotate(tilt);

    ctx.fillStyle = `rgb(0, 0, ${ink})`;
    ctx.fillText(word, 0, 0);

    ctx.restore();

    x += ctx.measureText(word).width + (5 + Math.random() * 8);

    if (x > 700) {
      x = 80;
      y += 38 + Math.random() * 5;
    }
  });
}
</script>

</body>
</html>
