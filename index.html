<!DOCTYPE html>
<html>
<head>
  <title>Real Handwritten Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      text-align:center;
      background:#e5e5e5;
      font-family:sans-serif;
    }

    textarea {
      width:320px;
      height:120px;
      margin:10px;
    }

    .paper-container {
      height:600px;
      overflow-y:auto;
      display:flex;
      justify-content:center;
    }

    canvas {
      margin-top:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
      border-radius:12px;
    }

    button {
      padding:10px;
      margin:5px;
    }
  </style>
</head>

<body>

<h2>Real Handwritten Notes ✍️</h2>

<button onclick="setPaper('ruled')">Ruled</button>
<button onclick="setPaper('white')">White</button>
<button onclick="setPaper('soft')">Old Paper</button>

<br>

<textarea id="text"></textarea><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>

<div class="paper-container">
  <canvas id="canvas" width="800" height="1100"></canvas>
</div>

<script>

let paperType = "ruled";

function setPaper(type){
  paperType = type;
}

function drawPaper(ctx){

  ctx.fillStyle = (paperType==="soft") ? "#f6f1e7" :
                  (paperType==="white") ? "#fff" : "#fbfbf5";

  ctx.fillRect(0,0,800,1100);

  if(paperType==="ruled"){
    ctx.strokeStyle="rgba(150,180,255,0.5)";
    for(let i=100;i<1100;i+=40){
      ctx.beginPath();
      ctx.moveTo(0,i);
      ctx.lineTo(800,i);
      ctx.stroke();
    }

    ctx.strokeStyle="rgba(255,0,0,0.6)";
    ctx.beginPath();
    ctx.moveTo(70,0);
    ctx.lineTo(70,1100);
    ctx.stroke();
  }
}

function generate(){

  const text = document.getElementById("text").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,800,1100);
  drawPaper(ctx);

  ctx.font="26px 'Dancing Script'";
  ctx.fillStyle="#1e3a8a";

  let x=90;
  let y=120;
  let lineHeight=40;
  let maxWidth=650;

  let words = text.split(" ");

  words.forEach(word=>{
    let w = ctx.measureText(word).width;

    if(x+w > maxWidth+90){
      x=90;
      y+=lineHeight;
    }

    ctx.fillText(word,x,y);
    x+=w+10;
  });

}

// 🔥 MULTI PAGE PDF
function downloadPDF(){

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const imgWidth = 210;
  const pageHeight = 297;

  const imgData = canvas.toDataURL("image/png");

  let imgHeight = canvas.height * imgWidth / canvas.width;
  let heightLeft = imgHeight;

  let position = 0;

  pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
  heightLeft -= pageHeight;

  while(heightLeft > 0){
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
    heightLeft -= pageHeight;
  }

  pdf.save("notes.pdf");
}

</script>

</body>
</html>
