<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Text to Handwriting</title>
    
    <!-- Tailwind CSS UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Google Fonts - Added 4 new fonts for B.Tech students -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@500;600&family=Homemade+Apple&family=Indie+Flower&family=Kalam&family=Patrick+Hand&family=Reenie+Beanie&family=Shadows+Into+Light&display=swap" rel="stylesheet">

    <style>
        :root {
            /* STRICT MATHEMATICAL GRID - 32px Fix */
            --grid-size: 32px; 
            --page-width: 794px;
            --page-height: 1123px; /* A4 Ratio */
        }

        html, body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5e7eb;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        /* --- Paper Styles --- */
        .a4-page {
            width: var(--page-width);
            height: var(--page-height);
            position: relative;
            overflow: hidden;
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            margin-bottom: 2rem;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .paper-plain { background-color: #ffffff; }

        .paper-rough {
            background-color: #fdfbf7;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
        }

        /* --- Text Container (RIGID GRID) --- */
        .text-layer {
            position: absolute;
            bottom: auto;
            left: 110px;
            right: 40px;
            
            /* CRITICAL: Locks text spacing perfectly to the grid */
            line-height: var(--grid-size) !important; 
            margin: 0 !important;
            padding: 0 !important;
            
            z-index: 10;
            word-wrap: break-word;
            white-space: pre-wrap; 
            outline: none;
            display: block;

            -webkit-text-size-adjust: none !important;
            text-size-adjust: none !important;
        }

        /* --- Typography (8 Fonts) --- */
        .font-caveat { font-family: 'Caveat', cursive; font-size: 26px; }
        .font-homemade { font-family: 'Homemade Apple', cursive; font-size: 14px; } 
        .font-shadows { font-family: 'Shadows Into Light', cursive; font-size: 22px; }
        .font-reenie { font-family: 'Reenie Beanie', cursive; font-size: 26px; }
        
        /* NEW FONTS */
        .font-patrick { font-family: 'Patrick Hand', cursive; font-size: 22px; }
        .font-kalam { font-family: 'Kalam', cursive; font-size: 20px; }
        .font-indie { font-family: 'Indie Flower', cursive; font-size: 22px; }
        .font-architects { font-family: 'Architects Daughter', cursive; font-size: 20px; }

        .color-blue { color: #1a3c8e; }
        .color-black { color: #222222; }
        .color-red { color: #c0392b; }

        /* --- PDF Export State --- */
        .exporting .a4-page {
            box-shadow: none !important;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
        }
        .exporting #preview-container {
            gap: 0 !important;
            padding: 0 !important;
            background: transparent !important;
            width: var(--page-width) !important;
        }
        .exporting #scale-wrapper {
            transform: none !important; 
            width: auto !important;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    </style>
</head>

<body class="flex flex-col md:flex-row min-h-screen">

    <!-- Controls Sidebar -->
    <aside class="w-full md:w-[350px] bg-white shadow-2xl z-20 flex flex-col shrink-0 md:h-screen md:sticky md:top-0 overflow-y-auto">
        <div class="p-5 border-b border-gray-100">
            <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Handwriting Studio
            </h1>
        </div>

        <div class="p-5 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Mee Text (Your Text)</label>
                <textarea id="input-text" rows="5" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all resize-none text-sm" placeholder="Paste your assignment/record text here..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Writing Style</label>
                    <select id="font-select" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm bg-white">
                        <optgroup label="B.Tech / Assignments">
                            <option value="font-patrick">Engineering Neat</option>
                            <option value="font-kalam">Fast Notes</option>
                            <option value="font-indie">Casual Record</option>
                            <option value="font-architects">Assignment Clean</option>
                        </optgroup>
                        <optgroup label="Classic Styles">
                            <option value="font-caveat">Normal Handwriting</option>
                            <option value="font-shadows">Neat Print</option>
                            <option value="font-homemade">Cursive Writing</option>
                            <option value="font-reenie">Rough Scribble</option>
                        </optgroup>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Ink Color</label>
                    <select id="color-select" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm bg-white">
                        <option value="color-blue">Royal Blue</option>
                        <option value="color-black">Jet Black</option>
                        <option value="color-red">Red</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Paper</label>
                <div class="flex gap-2">
                    <label class="flex-1 cursor-pointer relative">
                        <input type="radio" name="paper-type" value="paper-ruled" class="peer sr-only" checked>
                        <div class="p-2 text-center border-2 border-gray-200 rounded-lg peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                            <span class="text-xs font-semibold">Ruled</span>
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer relative">
                        <input type="radio" name="paper-type" value="paper-plain" class="peer sr-only">
                        <div class="p-2 text-center border-2 border-gray-200 rounded-lg peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                            <span class="text-xs font-semibold">Plain</span>
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer relative">
                        <input type="radio" name="paper-type" value="paper-rough" class="peer sr-only">
                        <div class="p-2 text-center border-2 border-gray-200 rounded-lg peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                            <span class="text-xs font-semibold">Cream</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                <label class="flex justify-between text-xs font-bold text-gray-700 mb-1">
                    <span>Baseline Alignment (Y-Offset)</span>
                    <span id="y-offset-val" class="font-mono text-xs text-blue-600">0px</span>
                </label>
                <input type="range" id="y-offset" min="-5" max="20" value="0" class="w-full accent-blue-600">
                <p class="text-[10px] text-gray-500 mt-1">Text ni kinda ki push chesi blue line meeda perfect ga kurchobeditundi.</p>
                
                <label class="flex justify-between text-xs font-bold text-gray-700 mt-3 mb-1">
                    <span>Word Spacing</span>
                    <span id="spacing-val" class="font-mono text-xs text-blue-600">2px</span>
                </label>
                <input type="range" id="word-spacing" min="0" max="15" value="2" class="w-full accent-blue-600">
            </div>

            <div class="pt-2 pb-6 border-t border-gray-100 flex gap-3">
                <button onclick="generatePreview()" class="flex-1 py-3 bg-gray-800 hover:bg-black text-white rounded-lg font-bold text-sm shadow-md transition-all">
                    Generate
                </button>
                <button onclick="downloadPDF()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold text-sm shadow-md transition-all">
                    Save PDF
                </button>
            </div>
        </div>
    </aside>

    <!-- Preview Area -->
    <main class="flex-1 overflow-x-auto relative bg-gray-200 flex flex-col items-center">
        <div class="w-full flex justify-center p-4 min-w-[max-content]">
            <div id="scale-wrapper" style="transform-origin: top center; transform: scale(min(1, calc(100vw / 850)));" class="pb-10 transition-transform duration-300">
                <div id="preview-container" class="flex flex-col gap-6 w-[794px]">
                    <!-- Pages generated here -->
                </div>
            </div>
        </div>
        
        <div id="loader" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
            <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
            <p class="text-gray-800 font-bold" id="loader-text">Processing pages...</p>
        </div>
    </main>

    <script>
        const defaultText = `Matter type chey bro !`;

        document.getElementById('input-text').value = defaultText;

        // Sliders
        document.getElementById('y-offset').addEventListener('input', (e) => {
            document.getElementById('y-offset-val').innerText = `${e.target.value}px`;
        });
        document.getElementById('word-spacing').addEventListener('input', (e) => {
            document.getElementById('spacing-val').innerText = `${e.target.value}px`;
        });

        // FIXED PRESETS FOR ALL 8 FONTS
        document.getElementById('font-select').addEventListener('change', (e) => {
            const yOffsetInput = document.getElementById('y-offset');
            switch(e.target.value) {
                case 'font-caveat': yOffsetInput.value = 5; break;      
                case 'font-homemade': yOffsetInput.value = 8; break;   
                case 'font-shadows': yOffsetInput.value = 6; break;
                case 'font-reenie': yOffsetInput.value = 5; break;
                
                // New B.Tech Fonts Presets
                case 'font-patrick': yOffsetInput.value = 6; break;
                case 'font-kalam': yOffsetInput.value = 4; break;
                case 'font-indie': yOffsetInput.value = 6; break;
                case 'font-architects': yOffsetInput.value = 8; break;
                
                default: yOffsetInput.value = 5;
            }
            document.getElementById('y-offset-val').innerText = `${yOffsetInput.value}px`;
        });

        document.getElementById('font-select').dispatchEvent(new Event('change'));

        // --- MAX HEIGHT LOGIC ---
        const MAX_HEIGHT = 1056; 

        function createNewPage(paperClass, fontClass, colorClass, yOffset, wordSpacing) {
            const page = document.createElement('div');
            page.className = `a4-page ${paperClass}`;
            
            // 1. Draw Real Absolute Lines for 100% PDF Sync
            if (paperClass === 'paper-ruled') {
                const bgLayer = document.createElement('div');
                bgLayer.className = 'absolute inset-0 z-0 pointer-events-none';
                
                // Red Margin
                const redMargin = document.createElement('div');
                redMargin.style.position = 'absolute';
                redMargin.style.left = '100px';
                redMargin.style.top = '0';
                redMargin.style.bottom = '0';
                redMargin.style.width = '2px';
                redMargin.style.backgroundColor = 'rgba(224, 108, 117, 0.8)';
                bgLayer.appendChild(redMargin);

                // EXACT Coordinate Blue Lines
                for(let i = 1; i <= 34; i++) {
                    const line = document.createElement('div');
                    line.style.position = 'absolute';
                    line.style.top = `${i * 32}px`; 
                    line.style.left = '0';
                    line.style.right = '0';
                    line.style.height = '1px';
                    line.style.backgroundColor = '#8cb1da';
                    bgLayer.appendChild(line);
                }
                page.appendChild(bgLayer);
            }
            
            // 2. Text Container
            const textContainer = document.createElement('div');
            textContainer.className = `text-layer ${fontClass} ${colorClass}`;
            
            textContainer.style.top = '32px'; 
            
            // Apply Offset
            textContainer.style.transform = `translateY(${yOffset}px)`;
            textContainer.style.wordSpacing = `${wordSpacing}px`;
            
            page.appendChild(textContainer);
            return { page, textContainer };
        }

        async function generatePreview() {
            const text = document.getElementById('input-text').value.trim();
            const container = document.getElementById('preview-container');
            const loader = document.getElementById('loader');
            
            if (!text) return alert('Doya chesi text enter cheyyandi (Please enter text).');

            loader.classList.remove('hidden');
            await new Promise(resolve => setTimeout(resolve, 50)); 

            container.innerHTML = '';

            const font = document.getElementById('font-select').value;
            const color = document.getElementById('color-select').value;
            const paper = document.querySelector('input[name="paper-type"]:checked').value;
            const yOffset = document.getElementById('y-offset').value;
            const wordSpacing = document.getElementById('word-spacing').value;

            const paragraphs = text.split('\n');
            let current = createNewPage(paper, font, color, yOffset, wordSpacing);
            container.appendChild(current.page);

            for (let p = 0; p < paragraphs.length; p++) {
                if (paragraphs[p] === "") {
                    const nl = document.createTextNode('\n');
                    current.textContainer.appendChild(nl);
                    
                    if (current.textContainer.scrollHeight > MAX_HEIGHT) {
                        nl.remove();
                        current = createNewPage(paper, font, color, yOffset, wordSpacing);
                        container.appendChild(current.page);
                        current.textContainer.appendChild(document.createTextNode('\n')); 
                    }
                    continue;
                }

                const words = paragraphs[p].split(' ');

                for (let w = 0; w < words.length; w++) {
                    const word = words[w];
                    const spacing = (w < words.length - 1) ? ' ' : '';
                    const wordNode = document.createTextNode(word + spacing);
                    current.textContainer.appendChild(wordNode);

                    if (current.textContainer.scrollHeight > MAX_HEIGHT) {
                        wordNode.remove();
                        current = createNewPage(paper, font, color, yOffset, wordSpacing);
                        container.appendChild(current.page);
                        current.textContainer.appendChild(document.createTextNode(word + spacing));
                    }
                }

                if (p < paragraphs.length - 1) {
                    const nl = document.createTextNode('\n');
                    current.textContainer.appendChild(nl);

                    if (current.textContainer.scrollHeight > MAX_HEIGHT) {
                        nl.remove();
                        current = createNewPage(paper, font, color, yOffset, wordSpacing);
                        container.appendChild(current.page);
                    }
                }
            }

            loader.classList.add('hidden');
        }

        // PDF Exporter
        function downloadPDF() {
            const container = document.getElementById('preview-container');
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loader-text');
            const scaleWrapper = document.getElementById('scale-wrapper');
            
            if (container.children.length === 0) {
                alert('Mundu Generate button click cheyyandi (Click Generate first).');
                return;
            }

            loaderText.innerText = "PDF generate avuthundi (Exporting Document)...";
            loader.classList.remove('hidden');
            
            document.body.classList.add('exporting');
            const originalTransform = scaleWrapper.style.transform;
            scaleWrapper.style.transform = 'none'; 

            // Optimized PDF Options
            const opt = {
                margin:       0,
                filename:     'handwritten-notes.pdf',
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0,
                    windowWidth: 794 // STRICT A4 width mapped for PDF rendering
                },
                jsPDF:        { 
                    unit: 'px', 
                    format: [794, 1123], 
                    orientation: 'portrait',
                    hotfixes: ["px_scaling"] // Fixes line drifting in jsPDF
                }
            };

            html2pdf().set(opt).from(container).save().then(() => {
                document.body.classList.remove('exporting');
                scaleWrapper.style.transform = originalTransform;
                loader.classList.add('hidden');
                loaderText.innerText = "Processing pages...";
            }).catch(err => {
                console.error("PDF Error:", err);
                document.body.classList.remove('exporting');
                scaleWrapper.style.transform = originalTransform;
                loader.classList.add('hidden');
                alert("Oka error vachindi. Malli try cheyyandi (An error occurred).");
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            generatePreview();
        });
    </script>
</body>
</html>
