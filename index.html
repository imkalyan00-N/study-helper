<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Pro V13 - Scroll Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Shadows+Into+Light&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-height: 35.45px;
            --ink-color: #1a3c8e;
        }

        body { 
            background-color: #2c3e50; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            overflow-x: hidden;
        }
        
        .controls { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            width: 95%; 
            max-width: 600px; 
            margin-bottom: 30px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }
        
        textarea { width: 100%; height: 120px; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }

        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin: 5px; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }

        /* Fixed: Render container now allows internal scrolling if needed */
        #render-container {
            display: none;
            flex-direction: column;
            width: 210mm;
            padding-bottom: 50px;
        }

        .paper-page {
            width: 210mm;
            height: 297mm;
            background-color: white;
            position: relative;
            box-sizing: border-box;
            padding: 44.5px 50px 40px 75px; 
            overflow: hidden;
            /* Visible Black Divider with safety gap */
            border-bottom: 10px solid #111; 
            margin-bottom: 20px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .lines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(#d1e2ff 1.2px, transparent 1.2px);
            background-size: 100% var(--line-height);
            background-position: 0 42px;
            pointer-events: none;
        }

        .margin {
            position: absolute;
            top: 0; left: 68px; width: 2px; height: 100%;
            border-left: 1.5px solid #ffb3b3;
        }

        .text {
            position: relative;
            z-index: 10;
            font-size: 25.8px;
            line-height: var(--line-height);
            color: var(--ink-color);
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            padding: 0;
        }

        /* Scale for mobile view */
        @media (max-width: 210mm) {
            #render-container { 
                transform: scale(0.42); 
                transform-origin: top center; 
                margin-top: -150px; /* Adjust for scale gap */
            }
            body { height: auto; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <textarea id="userInput" placeholder="Matter paste chey bro..."></textarea>
        <div>
            <select id="font" style="padding:8px;"><option value="'Caveat', cursive">Clean Hand</option><option value="'Shadows Into Light', cursive">Sharp Style</option></select>
            <select id="color" style="padding:8px;"><option value="#1a3c8e">Blue Ink</option><option value="#222">Black Ink</option></select>
        </div>
        <button class="btn btn-gen" onclick="generate()">Generate Preview</button>
        <button class="btn btn-pdf" onclick="download()">Download PDF</button>
    </div>

    <div id="render-container"></div>

<script>
    function generate() {
        const text = document.getElementById('userInput').value;
        const container = document.getElementById('render-container');
        if(!text.trim()) return;

        container.innerHTML = '';
        container.style.display = 'flex';

        // Split text into lines and group by 23 lines per page
        const lines = text.split('\n');
        const linesPerPage = 23; 
        
        for (let i = 0; i < Math.ceil(lines.length / linesPerPage); i++) {
            const page = document.createElement('div');
            page.className = 'paper-page';
            page.style.fontFamily = document.getElementById('font').value;

            const content = lines.slice(i * linesPerPage, (i + 1) * linesPerPage).join('\n');

            page.innerHTML = `
                <div class="lines"></div>
                <div class="margin"></div>
                <div class="text" style="color:${document.getElementById('color').value}">${content}</div>
            `;
            container.appendChild(page);
        }
        
        // Ensure body can expand to show all pages
        document.body.style.height = "auto";
        window.scrollTo({ top: container.offsetTop - 50, behavior: 'smooth' });
    }

    function download() {
        const element = document.getElementById('render-container');
        if(!element.innerHTML) return alert("First Generate Preview!");

        const pages = document.querySelectorAll('.paper-page');
        
        // PDF cleanup: hide dividers and shadows
        pages.forEach(p => {
            p.style.borderBottom = 'none';
            p.style.marginBottom = '0';
            p.style.boxShadow = 'none';
        });

        const opt = {
            margin: 0,
            filename: 'Handwritten_Note.pdf',
            html2canvas: { scale: 2, useCORS: true, logging: false },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).toPdf().get('pdf').then(() => {
            // Restore for preview
            pages.forEach(p => {
                p.style.borderBottom = '10px solid #111';
                p.style.marginBottom = '20px';
                p.style.boxShadow = '0 0 10px rgba(0,0,0,0.5)';
            });
        }).save();
    }
</script>

</body>
</html>
