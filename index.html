<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Handwriter Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Homemade+Apple&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-height: 35px; /* Precise height to match image lines */
        }

        body { background-color: #2c3e50; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .controls { background: #fff; padding: 25px; border-radius: 12px; width: 95%; max-width: 600px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
        textarea { width: 100%; height: 120px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; padding: 12px; font-size: 16px; box-sizing: border-box; }
        
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ddd; }

        /* Paper Box */
        #paper-wrapper { display: none; margin-top: 10px; overflow: hidden; }
        
        #paper {
            width: 210mm; 
            min-height: 297mm; 
            background: #fff;
            position: relative;
            padding: 40px 40px 40px 75px; /* Alignment with first line */
            box-sizing: border-box;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* The Ruling (Blue Lines) */
        .ruled-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(transparent calc(var(--line-height) - 1px), #b5c9e8 1px);
            background-size: 100% var(--line-height);
            background-position: 0 40px; /* Sync with padding-top */
            pointer-events: none;
            z-index: 1;
        }

        /* Margin Line (Red) */
        .margin-red {
            position: absolute;
            top: 0; left: 65px;
            width: 1px; height: 100%;
            background-color: #ffb3b3;
            z-index: 2;
        }

        /* The Content Layer */
        #output {
            font-family: 'Caveat', cursive;
            font-size: 26px;
            color: #1a3c8e; /* Realistic Blue Pen */
            line-height: var(--line-height);
            white-space: pre-wrap;
            position: relative;
            z-index: 3;
            /* ALIGNMENT: Moves text exactly ON TOP of the line */
            transform: translateY(7px); 
            letter-spacing: 0.5px;
            filter: blur(0.2px); /* Slight ink bleed for realism */
        }

        /* Paper Variants */
        .paper-plain { background-image: none !important; }
        .paper-rough { background: #fdf6e3 !important; }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="margin:0 0 15px 0">Exam Handwriter</h2>
        <textarea id="txtInput" placeholder="Ikkada matter type chey bro..."></textarea>
        
        <div style="margin-bottom: 15px;">
            <select id="paperSel" onchange="updateStyle()">
                <option value="ruled">Ruled Paper</option>
                <option value="plain">Plain White</option>
                <option value="rough">Off-White (Rough)</option>
            </select>
            
            <select id="fontSel" onchange="updateStyle()">
                <option value="'Caveat', cursive">Caveat (Pen Style)</option>
                <option value="'Homemade Apple', cursive">Messy (More Realistic)</option>
            </select>
        </div>

        <div class="btn-row">
            <button class="btn btn-gen" onclick="generate()">Generate Note</button>
            <button class="btn btn-pdf" onclick="download()">Download PDF</button>
        </div>
    </div>

    <div id="paper-wrapper">
        <div id="paper">
            <div id="lines" class="ruled-overlay"></div>
            <div id="margin" class="margin-red"></div>
            <div id="output"></div>
        </div>
    </div>

<script>
    function updateStyle() {
        const paper = document.getElementById('paper');
        const lines = document.getElementById('lines');
        const margin = document.getElementById('margin');
        const output = document.getElementById('output');
        const pType = document.getElementById('paperSel').value;
        const fType = document.getElementById('fontSel').value;

        output.style.fontFamily = fType;

        if(pType === 'plain' || pType === 'rough') {
            lines.style.display = 'none';
            margin.style.display = 'none';
            paper.style.background = pType === 'rough' ? '#fdf6e3' : '#ffffff';
        } else {
            lines.style.display = 'block';
            margin.style.display = 'block';
            paper.style.background = '#ffffff';
        }
    }

    function generate() {
        const val = document.getElementById('txtInput').value;
        if(!val) return alert("Text rayi bro!");
        document.getElementById('output').innerText = val;
        document.getElementById('paper-wrapper').style.display = 'block';
    }

    function download() {
        const element = document.getElementById('paper');
        const opt = {
            margin: 0,
            filename: 'handwritten_record.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 3, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
