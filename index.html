<!DOCTYPE html>
<html>
<head>
  <title>Real Handwritten Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      background: #ececec;
      font-family: sans-serif;
    }

    textarea {
      width: 320px;
      height: 130px;
      margin-top: 15px;
      display: none;
    }

    canvas {
      margin-top: 20px;
      background: #fdfdf8;
      box-shadow: 0 0 15px rgba(0,0,0,0.25);
    }

    button {
      margin: 8px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Handwritten Notes ✍️</h2>

<div>
  <button onclick="selectPaper('ruled')">Ruled Paper</button>
  <button onclick="selectPaper('white')">White Paper</button>
</div>

<textarea id="text" placeholder="Type notes..."></textarea><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadImage()">Download</button>

<br>
<canvas id="canvas" width="800" height="1000"></canvas>

<script>

let paperType = "ruled";

function selectPaper(type){
  paperType = type;
  document.getElementById("text").style.display = "block";
}

// detect
function isHeading(line){
  return line.length < 30 && line === line.toUpperCase();
}

function isQuestion(line){
  return line.includes("?") || line.toLowerCase().startsWith("what") || line.toLowerCase().startsWith("define");
}

// realistic underline
function drawUnderline(ctx, x, y, width){
  let base = y + 6;

  ctx.lineWidth = 1;

  ctx.beginPath();
  for(let i=0;i<=width;i+=5){
    let wave = Math.sin(i*0.04)*1;
    ctx.lineTo(x+i, base+wave);
  }
  ctx.stroke();

  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  for(let i=0;i<=width;i+=6){
    let wave = Math.sin(i*0.04)*1;
    ctx.lineTo(x+i, base+wave+1);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// realistic paper
function drawPaper(ctx){
  // off-white paper
  ctx.fillStyle="#fbfbf5";
  ctx.fillRect(0,0,800,1000);

  if(paperType === "ruled"){

    // light blue lines
    ctx.strokeStyle="rgba(100,150,255,0.25)";
    for(let i=60;i<1000;i+=30){
      ctx.beginPath();
      ctx.moveTo(0,i);
      ctx.lineTo(800,i);
      ctx.stroke();
    }

    // margin (light red)
    ctx.strokeStyle="rgba(255,0,0,0.4)";
    ctx.beginPath();
    ctx.moveTo(70,0);
    ctx.lineTo(70,1000);
    ctx.stroke();
  }
}

// main
function generate(){
  const text = document.getElementById("text").value;
  if(!text){
    alert("Enter text bro");
    return;
  }

  const lines = text.split("\n");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,800,1000);

  drawPaper(ctx);

  let x = 90;
  let y = 90;

  lines.forEach(line => {

    line = line.trim();
    if(!line){
      y += 18;
      return;
    }

    // heading
    if(isHeading(line)){
      ctx.font="bold 24px Dancing Script";
      ctx.fillStyle="#111";
      ctx.fillText(line,x,y);

      let w = ctx.measureText(line).width;
      drawUnderline(ctx,x,y,w);

      y += 32;
    }

    // question
    else if(isQuestion(line)){
      ctx.font="bold 23px Dancing Script";
      ctx.fillStyle="#111";
      ctx.fillText("Q. "+line,x,y);
      y += 28;
    }

    // answer
    else{
      ctx.font="22px Dancing Script";

      let words=line.split(" ");
      let temp="";

      words.forEach(word=>{
        let test=temp+word+" ";
        let w=ctx.measureText(test).width;

        if(w>650){
          ctx.fillStyle=`rgb(0,0,${150+Math.random()*20})`;
          ctx.fillText(temp,x,y);

          temp=word+" ";
          y+=26;
        }else{
          temp=test;
        }
      });

      ctx.fillStyle=`rgb(0,0,${150+Math.random()*20})`;
      ctx.fillText(temp,x,y);
      y+=30;
    }

  });
}

// download
function downloadImage(){
  const canvas = document.getElementById("canvas");
  const link = document.createElement("a");
  link.download = "notes.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
