<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwriter Perfect Final</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
    --line-height: 34px;
}

body {
    background: #2c3e50;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* UI */
.controls {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 95%;
    max-width: 600px;
    margin-bottom: 20px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
}

/* SCROLL */
#paper-wrapper {
    display: none;
    max-height: 80vh;
    overflow-y: auto;
}

/* PAGE */
.page {
    width: 210mm;
    height: 297mm;
    background: #fff;
    position: relative;
    margin-bottom: 20px;
    box-sizing: border-box;
    overflow: hidden;
}

/* LINES */
.lines {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: linear-gradient(
        transparent calc(var(--line-height) - 1px),
        #b5c9e8 1px
    );
    background-size: 100% var(--line-height);
}

/* MARGIN */
.margin {
    position: absolute;
    left: 65px;
    width: 1px;
    height: 100%;
    background: red;
}

/* TEXT */
.text {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: #1a3c8e;
    line-height: var(--line-height);
    padding: 40px 40px 0 75px;
    white-space: pre-wrap; /* 🔥 IMPORTANT */
    word-wrap: break-word;
}
</style>
</head>

<body>

<div class="controls">
    <h2>Handwriter Perfect ✅</h2>
    <textarea id="input" placeholder="Type or paste your content..."></textarea><br><br>
    <button onclick="generate()">Preview</button>
    <button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="paper-wrapper"></div>

<script>
function generate() {
    const text = document.getElementById("input").value;
    if (!text) return alert("Enter text bro");

    const wrapper = document.getElementById("paper-wrapper");
    wrapper.innerHTML = "";
    wrapper.style.display = "block";

    let page = createPage();
    let textBox = page.querySelector(".text");

    // 🔥 FULL TEXT NODE (NOT WORD SPLIT)
    const content = document.createElement("div");
    content.innerText = text;
    textBox.appendChild(content);

    // 🔥 CHECK OVERFLOW AND SPLIT
    while (textBox.scrollHeight > textBox.clientHeight) {

        let words = content.innerText.split(" ");
        content.innerText = "";

        let temp = "";
        let lastGood = "";

        for (let word of words) {
            temp += word + " ";
            content.innerText = temp;

            if (textBox.scrollHeight > textBox.clientHeight) {
                break;
            }
            lastGood = temp;
        }

        // remove overflow text
        content.innerText = lastGood.trim();

        // create next page
        page = createPage();
        textBox = page.querySelector(".text");

        const newContent = document.createElement("div");
        newContent.innerText = words.join(" ").replace(lastGood.trim(), "").trim();
        textBox.appendChild(newContent);

        content.innerText = newContent.innerText;
    }

    function createPage() {
        const page = document.createElement("div");
        page.className = "page";

        page.innerHTML = `
            <div class="lines"></div>
            <div class="margin"></div>
            <div class="text"></div>
        `;

        wrapper.appendChild(page);
        return page;
    }
}

function downloadPDF() {
    const element = document.getElementById("paper-wrapper");

    html2pdf().set({
        margin: 0,
        filename: "handwritten.pdf",
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 3 },
        jsPDF: { unit: 'mm', format: 'a4' }
    }).from(element).save();
}
</script>

</body>
</html>
