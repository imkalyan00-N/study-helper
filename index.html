<script>
function generate() {
    const text = document.getElementById("input").value;
    if (!text) return alert("Enter text bro");

    const wrapper = document.getElementById("paper-wrapper");
    wrapper.innerHTML = "";
    wrapper.style.display = "block";

    let words = text.split(" ");
    let currentPage = createPage();
    let textBox = currentPage.querySelector(".text");

    let line = "";

    words.forEach((word, index) => {
        let testLine = line + word + " ";
        textBox.innerText = testLine;

        if (textBox.scrollHeight > textBox.clientHeight) {
            // new page
            currentPage = createPage();
            textBox = currentPage.querySelector(".text");
            line = word + " ";
        } else {
            line = testLine;
        }

        textBox.innerText = line;
    });

    function createPage() {
        const page = document.createElement("div");
        page.className = "page";

        page.innerHTML = `
            <div class="lines"></div>
            <div class="margin"></div>
            <div class="text"></div>
        `;

        wrapper.appendChild(page);
        return page;
    }
}
</script>
