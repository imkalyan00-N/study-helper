<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Note Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f0f0f0; }
        .container { max-width: 600px; margin: auto; text-align: center; }
        
        /* Rule Paper Styling */
        #paper {
            width: 100%;
            min-height: 400px;
            background: white;
            background-image: linear-gradient(#91c9ff 1px, transparent 1px);
            background-size: 100% 1.5em; /* This creates the lines */
            padding: 40px 20px;
            line-height: 1.5em;
            font-family: 'Dancing Script', cursive; /* Handwritten Font */
            font-size: 22px;
            text-align: left;
            border: 1px solid #ccc;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            color: blue; /* Ink Color */
            white-space: pre-wrap;
        }

        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Handwritten Note Generator</h2>
    <textarea id="userInput" placeholder="Ikkada matter type chey bro..."></textarea>
    <br>
    <button onclick="generateNote()">Generate Note</button>

    <hr>
    
    <div id="paper">
        Nuvvu type chesina text ikkada hand-written style lo kanipistundi...
    </div>
</div>

<script>
    function generateNote() {
        const text = document.getElementById('userInput').value;
        const paper = document.getElementById('paper');
        paper.innerText = text;
    }
</script>

</body>
</html>
