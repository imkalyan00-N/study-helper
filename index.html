<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text to Handwriting PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&family=Homemade+Apple&family=Shadows+Into+Light&family=Reenie+Beanie&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
 margin:0;
 background:#f5f5f5;
 font-family:sans-serif;
}

.controls{
 background:#222;
 color:#fff;
 padding:10px;
 display:flex;
 flex-wrap:wrap;
 gap:10px;
}

textarea{
 width:100%;
 height:100px;
}

button{
 padding:10px;
 background:#3498db;
 color:white;
 border:none;
}

select{padding:5px}

/* PERFECT A4 PAGE */
.page{
 width:794px;
 height:1123px;
 margin:20px auto;
 padding:60px 40px 40px 60px;
 box-sizing:border-box;
 page-break-after:always;
 overflow:hidden;
}

/* PERFECT LINE MATCH */
.ruled{
 background:
 linear-gradient(to right,#ff4d4d 50px,transparent 50px),
 repeating-linear-gradient(
  to bottom,
  #ffffff 0px,
  #ffffff 34.5px,
  #cce0ff 34.5px,
  #cce0ff 35.5px
 );
 background-size:100% 35.5px;
}

.plain{background:#fff;}
.cream{background:#fdf6e3;}

.content{
 line-height:34.5px;
 font-size:22px;
 white-space:pre-wrap;
 word-break:break-word;
}
</style>
</head>

<body>

<div class="controls">
<textarea id="inputText" placeholder="Enter text..."></textarea>

<select id="font">
<option>Caveat</option>
<option>Homemade Apple</option>
<option>Shadows Into Light</option>
<option>Reenie Beanie</option>
</select>

<select id="color">
<option value="#1a3c8e">Blue</option>
<option value="#222222">Black</option>
<option value="#c0392b">Red</option>
</select>

<select id="paper">
<option value="ruled">Ruled</option>
<option value="plain">Plain</option>
<option value="cream">Cream</option>
</select>

<button onclick="generate()">Generate Preview</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="preview"></div>

<script>
function generate(){
 const text=document.getElementById('inputText').value;
 const preview=document.getElementById('preview');
 preview.innerHTML="";

 const words=text.split(" ");
 let lines=[];
 let line="";

 // SMART WORD WRAP (no cut words)
 words.forEach(word=>{
   if((line+word).length>65){
     lines.push(line);
     line=word+" ";
   }else{
     line+=word+" ";
   }
 });
 lines.push(line);

 const linesPerPage=30; // EXACT FIT
 let page,content;

 lines.forEach((l,i)=>{
   if(i%linesPerPage===0){
     page=document.createElement("div");
     page.className="page "+document.getElementById("paper").value;

     content=document.createElement("div");
     content.className="content";
     content.style.fontFamily=document.getElementById("font").value;
     content.style.color=document.getElementById("color").value;

     page.appendChild(content);
     preview.appendChild(page);
   }
   content.innerHTML+=l+"\n";
 });
}

function downloadPDF(){
 const element=document.getElementById("preview");

 html2pdf().set({
   margin:0,
   filename:"handwriting.pdf",
   html2canvas:{scale:2},
   jsPDF:{
     unit:"px",
     format:[794,1123],
     orientation:"portrait"
   },
   pagebreak:{
     mode:["css","legacy"]
   }
 }).from(element).save();
}
</script>

</body>
</html>
