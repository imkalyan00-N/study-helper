<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Note Generator - Final Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Homemade+Apple&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-gap: 31px; /* Precise line height */
        }

        body { background-color: #34495e; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .controls { background: white; padding: 20px; border-radius: 10px; width: 95%; max-width: 550px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; color: white; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }

        /* Paper Area */
        #paper-wrapper { display: none; }

        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: #fff;
            position: relative;
            padding: 0; /* Removing padding to sync lines better */
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        /* Line Background */
        .lines-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(#e1eef7 1.5px, transparent 1.5px);
            background-size: 100% var(--line-gap);
            background-position: 0 40px; /* Starting of first line */
            pointer-events: none;
            z-index: 1;
        }

        .margin-red {
            position: absolute;
            top: 0; left: 65px;
            width: 1.5px; height: 100%;
            background-color: #ffb3b3;
            z-index: 2;
        }

        /* Text Alignment - The Fix */
        .content-area {
            position: relative;
            z-index: 3;
            padding: 40px 40px 40px 75px; /* Matches line start */
            font-family: 'Caveat', cursive;
            font-size: 26px;
            color: #1a3c8e;
            line-height: var(--line-gap);
            white-space: pre-wrap;
            /* Precise adjustment to sit ON the line */
            margin-top: -6px; 
        }

        .white-paper { background-image: none !important; }
        .rough-paper { background-color: #fdf6e3 !important; background-image: none !important; }
    </style>
</head>
<body>

    <div class="controls">
        <h3>Exam Note Fixer</h3>
        <textarea id="userInput" placeholder="Matter rayi bro..."></textarea>
        
        <div style="margin-bottom: 10px;">
            <select id="paperType" onchange="applyStyle()">
                <option value="ruled">Ruled Paper</option>
                <option value="white">White Paper</option>
                <option value="rough">Rough Paper</option>
            </select>
            <select id="fontStyle" onchange="applyStyle()">
                <option value="'Caveat', cursive">Clean Pen</option>
                <option value="'Homemade Apple', cursive">Realistic Cursive</option>
            </select>
        </div>

        <button class="btn btn-gen" onclick="generate()">Generate</button>
        <button class="btn btn-pdf" onclick="savePDF()">Download PDF</button>
    </div>

    <div id="paper-wrapper">
        <div id="paper" class="a4-page">
            <div id="lines" class="lines-layer"></div>
            <div id="margin" class="margin-red"></div>
            <div id="output" class="content-area"></div>
        </div>
    </div>

<script>
    function applyStyle() {
        const paper = document.getElementById('paper');
        const lines = document.getElementById('lines');
        const margin = document.getElementById('margin');
        const output = document.getElementById('output');
        const pType = document.getElementById('paperType').value;
        const font = document.getElementById('fontStyle').value;

        output.style.fontFamily = font;

        if (pType === 'white') {
            lines.style.display = 'none';
            margin.style.display = 'none';
            paper.style.backgroundColor = '#fff';
            paper.style.backgroundImage = 'none';
        } else if (pType === 'rough') {
            lines.style.display = 'none';
            margin.style.display = 'none';
            paper.style.backgroundColor = '#fdf6e3';
            paper.style.backgroundImage = 'none';
        } else {
            lines.style.display = 'block';
            margin.style.display = 'block';
            paper.style.backgroundColor = '#fff';
        }
    }

    function generate() {
        const text = document.getElementById('userInput').value;
        if(!text) return alert("Write something!");
        document.getElementById('output').innerText = text;
        document.getElementById('paper-wrapper').style.display = 'block';
    }

    function savePDF() {
        const element = document.getElementById('paper');
        const opt = {
            margin: 0,
            filename: 'Record_Fix.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 3, useCORS: true, logging: false },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
