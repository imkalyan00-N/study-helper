<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwriter FINAL FIX</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
    --line-height: 34px;
}

body {
    background: #2c3e50;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* UI */
.controls {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 95%;
    max-width: 600px;
    margin-bottom: 20px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
}

/* paper wrapper */
#paper-wrapper {
    display: none;
    width: 210mm;
}

/* SINGLE LONG PAGE (IMPORTANT) */
#paper {
    width: 210mm;
    background: #fff;
    position: relative;
    padding: 40px 40px 40px 75px;
    box-sizing: border-box;
}

/* lines */
.lines {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: linear-gradient(
        transparent calc(var(--line-height) - 1px),
        #b5c9e8 1px
    );
    background-size: 100% var(--line-height);
    background-position: 0 40px;
}

/* margin */
.margin {
    position: absolute;
    left: 65px;
    width: 1px;
    height: 100%;
    background: red;
}

/* text */
.text {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: #1a3c8e;
    line-height: var(--line-height);
    white-space: pre-wrap;
    transform: translateY(7px);
}
</style>
</head>

<body>

<div class="controls">
<h2>Handwriter FIXED ✅</h2>

<textarea id="input"></textarea><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="paper-wrapper">
    <div id="paper">
        <div class="lines"></div>
        <div class="margin"></div>
        <div id="output" class="text"></div>
    </div>
</div>

<script>
function generate() {
    const text = document.getElementById("input").value;
    if(!text) return alert("Text rayi bro");

    document.getElementById("paper-wrapper").style.display = "block";
    document.getElementById("output").innerText = text;
}

function downloadPDF() {
    const element = document.getElementById("paper");

    html2pdf().set({
        margin: 0,
        filename: "handwritten.pdf",

        html2canvas: {
            scale: 2,
            scrollY: 0
        },

        jsPDF: {
            unit: 'mm',
            format: 'a4'
        },

        /* 🔥 MAGIC FIX */
        pagebreak: {
            mode: ['css', 'legacy', 'avoid-all']
        }

    }).from(element).save();
}
</script>

</body>
</html>
