<!DOCTYPE html>
<html>
<head>
  <title>Real Handwritten Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      text-align:center;
      background:#e5e5e5;
      font-family:sans-serif;
    }

    textarea {
      width:320px;
      height:120px;
      margin:10px;
    }

    canvas {
      margin-top:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
      border-radius:12px;
    }

    button {
      padding:10px;
      margin:5px;
    }
  </style>
</head>

<body>

<h2>Real Handwritten Notes ✍️</h2>

<button onclick="setPaper('ruled')">Ruled</button>
<button onclick="setPaper('white')">White</button>
<button onclick="setPaper('soft')">Old Paper</button>

<br>

<textarea id="text" placeholder="Type your answer..."></textarea><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadImage()">Download Image</button>

<br>
<canvas id="canvas" width="800" height="1000"></canvas>

<script>

let paperType = "ruled";

function setPaper(type){
  paperType = type;
}

function drawTexture(ctx){
  for(let i=0;i<3000;i++){
    let x = Math.random()*800;
    let y = Math.random()*1000;
    let alpha = Math.random()*0.03;

    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(x,y,1,1);
  }
}

function drawPaper(ctx){

  // base colors
  if(paperType === "white"){
    ctx.fillStyle = "#ffffff";
  }
  else if(paperType === "soft"){
    ctx.fillStyle = "#f6f1e7"; // old paper
  }
  else{
    ctx.fillStyle = "#fbfbf5";
  }

  ctx.fillRect(0,0,800,1000);

  // texture
  drawTexture(ctx);

  // ruled lines
  if(paperType === "ruled"){
    ctx.strokeStyle="rgba(150,180,255,0.5)";
    for(let i=100;i<1000;i+=40){
      ctx.beginPath();
      ctx.moveTo(0,i);
      ctx.lineTo(800,i);
      ctx.stroke();
    }

    // margin
    ctx.strokeStyle="rgba(255,0,0,0.6)";
    ctx.beginPath();
    ctx.moveTo(70,0);
    ctx.lineTo(70,1000);
    ctx.stroke();
  }

  // slight shadow edges (real feel)
  let grad = ctx.createLinearGradient(0,0,800,1000);
  grad.addColorStop(0,"rgba(0,0,0,0.05)");
  grad.addColorStop(1,"rgba(0,0,0,0)");

  ctx.fillStyle = grad;
  ctx.fillRect(0,0,800,1000);
}

function generate(){

  const text = document.getElementById("text").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,800,1000);

  drawPaper(ctx);

  ctx.fillStyle="rgba(30,58,138,0.95)";
  ctx.font="26px 'Dancing Script'";

  let marginLeft = 90;
  let lineHeight = 42;
  let maxWidth = 650;

  let x = marginLeft;
  let y = 120;

  let words = text.split(" ");

  words.forEach(word => {

    let wordWidth = ctx.measureText(word).width;

    if(x + wordWidth > marginLeft + maxWidth){
      x = marginLeft;
      y += lineHeight;
    }

    // slight natural tilt
    let tilt = (Math.random()*2 -1) * 0.05;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(tilt);
    ctx.fillText(word,0,0);
    ctx.restore();

    x += wordWidth + 10;

  });

}

function downloadImage(){
  const canvas = document.getElementById("canvas");
  const link = document.createElement("a");
  link.download = "real_notes.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
