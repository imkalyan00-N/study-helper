<!DOCTYPE html>
<html>
<head>
  <title>Smart Handwritten Generator ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    textarea {
      width: 320px;
      height: 120px;
      margin-top: 20px;
    }

    canvas {
      margin-top: 20px;
      background: #fff;
      box-shadow: 0 0 12px rgba(0,0,0,0.2);
    }

    button {
      margin: 8px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Smart Handwritten Generator ✍️</h2>

<textarea id="text" placeholder="Example:
What is DBMS?
DBMS is a system to manage databases.

Operating System
OS manages hardware."></textarea><br>

<button onclick="generate()">Generate</button>

<br>
<canvas id="canvas" width="800" height="1000"></canvas>

<script>

function isHeading(line){
  return line.length < 25 && line === line.toUpperCase();
}

function isQuestion(line){
  return line.includes("?") || line.toLowerCase().startsWith("what") || line.toLowerCase().startsWith("define");
}

function generate(){
  const text = document.getElementById("text").value;
  if(!text){
    alert("Enter text bro");
    return;
  }

  const lines = text.split("\n");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,800,1000);

  // background
  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,800,1000);

  // ruled lines
  ctx.strokeStyle="#ddd";
  for(let i=60;i<1000;i+=32){
    ctx.beginPath();
    ctx.moveTo(0,i);
    ctx.lineTo(800,i);
    ctx.stroke();
  }

  // margin
  ctx.strokeStyle="red";
  ctx.beginPath();
  ctx.moveTo(60,0);
  ctx.lineTo(60,1000);
  ctx.stroke();

  let x = 80;
  let y = 80;

  lines.forEach(line => {

    line = line.trim();
    if(!line){
      y += 20;
      return;
    }

    // HEADING
    if(isHeading(line)){
      ctx.font="bold 34px Dancing Script";
      ctx.fillStyle="black";
      ctx.fillText(line, x, y);

      let width = ctx.measureText(line).width;

      ctx.beginPath();
      ctx.moveTo(x, y+10);
      ctx.lineTo(x+width, y+10);
      ctx.stroke();

      y += 40;
    }

    // QUESTION
    else if(isQuestion(line)){
      ctx.font="bold 30px Dancing Script";
      ctx.fillStyle="black";
      ctx.fillText("Q. " + line, x, y);
      y += 35;
    }

    // ANSWER
    else{
      ctx.font="28px Dancing Script";
      ctx.fillStyle="blue";

      let words = line.split(" ");
      let lineText="";

      words.forEach(word=>{
        let test=lineText+word+" ";
        let width=ctx.measureText(test).width;

        if(width>650){
          ctx.fillText(lineText,x,y);
          lineText=word+" ";
          y+=30;
        }else{
          lineText=test;
        }
      });

      ctx.fillText(lineText,x,y);
      y+=35;
    }

  });

  console.log("Smart render done ✅");
}

</script>

</body>
</html>
