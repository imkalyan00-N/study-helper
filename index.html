<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Note Generator Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Homemade+Apple&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-height: 34.5px;
        }

        body { background-color: #2c3e50; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .controls { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 600px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        textarea { width: 100%; height: 120px; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }

        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; color: white; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }

        /* PDF Area Styling */
        #paper-wrapper { display: none; width: 210mm; }

        .page {
            width: 210mm;
            min-height: 297mm;
            background: #fff;
            position: relative;
            padding: 44px 50px 40px 75px; 
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            /* This avoids the black line/split issue */
            page-break-after: always;
            overflow: hidden;
        }

        .ruled-bg {
            background-image: linear-gradient(#e1eef7 1.5px, transparent 1.5px);
            background-size: 100% var(--line-height);
            background-position: 0 38px;
        }

        .margin-red {
            position: absolute;
            top: 0; left: 65px;
            width: 1.5px; height: 100%;
            background-color: #ffb3b3;
            z-index: 2;
        }

        .content {
            font-family: 'Caveat', cursive;
            font-size: 26px;
            color: #1a3c8e;
            line-height: var(--line-height);
            white-space: pre-wrap;
            position: relative;
            z-index: 3;
            transform: translateY(11px); /* Aligns text on the line */
            word-wrap: break-word;
        }

        /* Hide controls when printing/generating */
        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Exam Paper PDF Generator</h2>
        <textarea id="userInput" placeholder="Ikkada matter type chey bro..."></textarea>
        
        <div style="margin-bottom: 10px;">
            <select id="fontStyle" onchange="updateStyle()">
                <option value="'Caveat', cursive">Normal Pen</option>
                <option value="'Homemade Apple', cursive">Realistic Cursive</option>
            </select>
            <select id="paperType" onchange="updateStyle()">
                <option value="ruled">Ruled</option>
                <option value="white">Plain White</option>
            </select>
        </div>

        <button class="btn btn-gen" onclick="generate()">Generate Note</button>
        <button class="btn btn-pdf" onclick="savePDF()">Download PDF</button>
    </div>

    <div id="paper-wrapper">
        <div id="paper" class="page ruled-bg">
            <div id="margin" class="margin-red"></div>
            <div id="output" class="content"></div>
        </div>
    </div>

<script>
    function updateStyle() {
        const paper = document.getElementById('paper');
        const margin = document.getElementById('margin');
        const output = document.getElementById('output');
        const type = document.getElementById('paperType').value;
        const font = document.getElementById('fontStyle').value;

        output.style.fontFamily = font;
        if (type === 'white') {
            paper.classList.remove('ruled-bg');
            margin.style.display = 'none';
        } else {
            paper.classList.add('ruled-bg');
            margin.style.display = 'block';
        }
    }

    function generate() {
        const text = document.getElementById('userInput').value;
        if(!text) return alert("Write something first!");
        document.getElementById('output').innerText = text;
        document.getElementById('paper-wrapper').style.display = 'block';
        updateStyle();
    }

    function savePDF() {
        const element = document.getElementById('paper');
        const opt = {
            margin:       [0, 0, 0, 0],
            filename:     'Handwritten_Note.pdf',
            image:        { type: 'jpeg', quality: 1 },
            html2canvas:  { 
                scale: 2, 
                useCORS: true,
                logging: false,
                letterRendering: true
            },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
            // This avoids the black line issue
            pagebreak:    { mode: 'avoid-all' }
        };
        
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
