<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwriter - bro enjoy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Homemade+Apple&family=Shadows+Into+Light&family=Reenie+Beanie&family=Nanum+Pen+Script&family=Just+Me+Again+Down+Here&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --ink-color: #1a3c8e; }
        body { background-color: #2c3e50; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .controls { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 650px; margin-bottom: 25px; text-align: center; }
        textarea { width: 100%; height: 100px; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }

        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin: 5px; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }

        #paper-container { width: 210mm; display: none; }
        
        .paper-page {
            width: 210mm;
            min-height: 297mm;
            background-color: #fff;
            padding: 50px 60px;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            page-break-after: always;
            position: relative;
        }

        .paper-pure-white { background-color: #ffffff !important; }
        .paper-cream { background-color: #fdf6e3 !important; }
        .paper-grey { background-color: #f4f4f4 !important; }

        .output-text {
            font-size: 26px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--ink-color);
            filter: blur(0.15px);
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Handwriter - No Cut Edition ✅</h2>
        <textarea id="userInput" placeholder="Paste your answer here..."></textarea>
        
        <div style="margin-bottom:15px;">
            <select id="fontStyle">
                <option value="'Caveat', cursive">Clean Pen</option>
                <option value="'Homemade Apple', cursive">Messy Cursive</option>
            </select>
            <select id="inkColor">
                <option value="#1a3c8e">Blue Ink</option>
                <option value="#222222">Black Ink</option>
            </select>
            <select id="paperType">
                <option value="paper-pure-white">Pure White</option>
                <option value="paper-cream">Cream Paper</option>
                <option value="paper-grey">Grey Paper</option>
            </select>
        </div>

        <button class="btn btn-gen" onclick="generate()">Preview Pages</button>
        <button class="btn btn-pdf" onclick="savePDF()">Download PDF</button>
    </div>

    <div id="paper-container"></div>

<script>
    function generate() {
        const text = document.getElementById('userInput').value;
        if(!text) return;

        const container = document.getElementById('paper-container');
        container.innerHTML = "";
        container.style.display = 'block';

        const lines = text.split('\n');
        const linesPerPage = 22; [span_4](start_span)//[span_4](end_span) Matches A4 height limit
        
        for (let i = 0; i < lines.length; i += linesPerPage) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'paper-page ' + document.getElementById('paperType').value;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'output-text';
            textDiv.style.fontFamily = document.getElementById('fontStyle').value;
            textDiv.style.color = document.getElementById('inkColor').value;
            
            const pageText = lines.slice(i, i + linesPerPage).join('\n');
            textDiv.innerText = pageText;
            
            pageDiv.appendChild(textDiv);
            container.appendChild(pageDiv);
        }
    }

    function savePDF() {
        const element = document.getElementById('paper-container');
        html2pdf().set({
            margin: 0,
            filename: 'No_Cut_Assignment.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    }
</script>

</body>
</html>
