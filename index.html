<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwriter Pro (Perfect Final Fix)</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
    --line-height: 34px;
}

body {
    background: #2c3e50;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.controls {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 95%;
    max-width: 600px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    border-radius: 5px;
}

#paper-wrapper {
    display: none;
}

/* 🔥 MULTI PAGE SUPPORT */
.page {
    width: 210mm;
    height: 297mm;
    background: #fff;
    position: relative;
    padding: 40px 40px 20px 75px;
    box-sizing: border-box;
    page-break-after: always;
}

/* Lines */
.lines {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: linear-gradient(
        transparent calc(var(--line-height) - 1px),
        #b5c9e8 1px
    );
    background-size: 100% var(--line-height);
    background-position: 0 40px;
}

/* Margin line */
.margin {
    position: absolute;
    left: 65px;
    width: 1px;
    height: 100%;
    background: red;
    z-index: 5;
}

/* Text */
.text {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: #1a3c8e;
    line-height: var(--line-height);
    white-space: pre-wrap;
    transform: translateY(7px);
    position: relative;
    z-index: 10;
}

/* Each line */
.handwriting-line {
    display: block;
}

/* Prevent cutting */
.handwriting-line {
    page-break-inside: avoid;
}
</style>
</head>

<body>

<div class="controls">
    <h2>Handwriter Perfect ✅</h2>
    <textarea id="input" placeholder="Type or paste your content here..."></textarea><br><br>
    <button onclick="generate()">Preview Pages</button>
    <button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="paper-wrapper"></div>

<script>
const LINE_HEIGHT = 34;
const PAGE_HEIGHT = 297; // mm
const TOP_PADDING = 40;
const BOTTOM_PADDING = 20;

// Approx lines per page
const LINES_PER_PAGE = Math.floor((PAGE_HEIGHT - TOP_PADDING - BOTTOM_PADDING) / (LINE_HEIGHT * 0.264));

function generate() {
    const text = document.getElementById("input").value;
    if(!text) return alert("Matter rayi bro!");

    const wrapper = document.getElementById("paper-wrapper");
    wrapper.innerHTML = "";
    wrapper.style.display = "block";

    const lines = text.split('\n');

    let page;
    let output;
    let lineCount = 0;

    function createPage() {
        page = document.createElement("div");
        page.className = "page";

        page.innerHTML = `
            <div class="lines"></div>
            <div class="margin"></div>
            <div class="text"></div>
        `;

        output = page.querySelector(".text");
        wrapper.appendChild(page);
        lineCount = 0;
    }

    createPage();

    lines.forEach(line => {
        if (lineCount >= LINES_PER_PAGE) {
            createPage(); // new page
        }

        const span = document.createElement("span");
        span.className = "handwriting-line";
        span.innerHTML = line || "&nbsp;";

        output.appendChild(span);
        lineCount++;
    });
}

function downloadPDF() {
    const element = document.getElementById("paper-wrapper");

    const opt = {
        margin: 0,
        filename: "handwritten_perfect.pdf",
        image: { type: 'jpeg', quality: 1.0 },
        html2canvas: { scale: 3, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
