<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Pro V6 - MultiPage Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Homemade+Apple&family=Shadows+Into+Light&family=Reenie+Beanie&family=Nanum+Pen+Script&family=Just+Me+Again+Down+Here&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-height: 35px; /* Fixed height for line matching */
            --ink-color: #1a3c8e;
        }

        body { background-color: #2c3e50; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .controls { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 600px; margin-bottom: 20px; text-align: center; position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin: 5px; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }

        /* The Paper Container */
        #paper-container {
            width: 210mm;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            display: none;
        }

        .page {
            width: 210mm;
            min-height: 297mm;
            padding: 45px 50px 40px 75px; 
            box-sizing: border-box;
            position: relative;
            background-color: #fff;
            overflow: hidden;
            page-break-after: always; /* Force PDF page break */
        }

        .ruled-lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(#e1eef7 1.5px, transparent 1.5px);
            background-size: 100% var(--line-height);
            background-position: 0 40px;
            pointer-events: none;
        }

        .margin-red {
            position: absolute;
            top: 0; left: 65px;
            width: 1.5px; height: 100%;
            background-color: #ffb3b3;
        }

        .content-area {
            position: relative;
            z-index: 5;
            font-size: 25px;
            line-height: var(--line-height);
            white-space: pre-wrap;
            color: var(--ink-color);
            word-wrap: break-word;
            margin-top: 5px;
        }

        /* Specific Paper Types */
        .white-paper .ruled-lines, .white-paper .margin-red { display: none; }
        .rough-paper { background-color: #fdf6e3 !important; }
    </style>
</head>
<body>

    <div class="controls">
        <textarea id="userInput" placeholder="Ikkada full matter paste chey bro..."></textarea>
        <div style="margin-bottom: 10px;">
            <select id="fontStyle" onchange="updateStyle()">
                <option value="'Caveat', cursive">Clean Pen</option>
                <option value="'Shadows Into Light', cursive">Sharp Pen</option>
                <option value="'Nanum Pen Script', cursive">Bold Marker</option>
            </select>
            <select id="inkColor" onchange="updateStyle()">
                <option value="#1a3c8e">Blue Ink</option>
                <option value="#222222">Black Ink</option>
            </select>
            <select id="paperType" onchange="updateStyle()">
                <option value="ruled">Ruled</option>
                <option value="white">White</option>
                <option value="rough">Rough</option>
            </select>
        </div>
        <button class="btn btn-gen" onclick="generate()">Generate Note</button>
        <button class="btn btn-pdf" onclick="downloadPDF()">Download PDF</button>
    </div>

    <div id="paper-container">
        </div>

<script>
    function updateStyle() {
        const container = document.getElementById('paper-container');
        const font = document.getElementById('fontStyle').value;
        const color = document.getElementById('inkColor').value;
        const type = document.getElementById('paperType').value;

        container.style.fontFamily = font;
        document.documentElement.style.setProperty('--ink-color', color);
        
        const pages = document.querySelectorAll('.page');
        pages.forEach(p => {
            p.className = 'page ' + (type === 'white' ? 'white-paper' : (type === 'rough' ? 'rough-paper' : ''));
        });
    }

    function generate() {
        const text = document.getElementById('userInput').value;
        const container = document.getElementById('paper-container');
        container.innerHTML = ''; // Clear old pages
        container.style.display = 'block';

        if(!text.trim()) return;

        // Create the first page
        let currentPage = createPage();
        container.appendChild(currentPage);
        
        const contentArea = currentPage.querySelector('.content-area');
        contentArea.innerText = text;

        updateStyle();
    }

    function createPage() {
        const div = document.createElement('div');
        div.className = 'page';
        div.innerHTML = `
            <div class="ruled-lines"></div>
            <div class="margin-red"></div>
            <div class="content-area"></div>
        `;
        return div;
    }

    function downloadPDF() {
        const element = document.getElementById('paper-container');
        const opt = {
            margin: 0,
            filename: 'Handwritten_Note.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid-all' } // Prevents cutting text in middle
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
