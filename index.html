<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Pro - V3</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Homemade+Apple&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-gap: 30.2px; /* Precision line spacing */
        }

        body { background-color: #333; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Controls Box */
        .controls { background: white; padding: 25px; border-radius: 15px; width: 95%; max-width: 600px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
        textarea { width: 100%; height: 120px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; padding: 12px; font-size: 16px; box-sizing: border-box; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; color: white; transition: 0.2s; }
        .btn-gen { background: #00b894; }
        .btn-pdf { background: #0984e3; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: #f9f9f9; }

        /* Paper Styling */
        #paper-wrapper { display: none; margin-top: 10px; }
        
        #paper {
            width: 210mm; 
            min-height: 297mm; 
            position: relative;
            padding: 42px 40px 40px 75px; /* First line start point */
            box-sizing: border-box;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* --- Paper Variants --- */
        .paper-ruled { 
            background: #fff; 
            background-image: linear-gradient(#e1eef7 1px, transparent 1px);
            background-size: 100% var(--line-gap);
        }
        
        .paper-white { background: #ffffff !important; background-image: none !important; }
        
        .paper-rough { 
            background: #fdf6e3 !important; /* Slightly yellow/rough feel */
            background-image: none !important;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.05) !important;
        }

        /* Red Margin Line */
        .margin-red {
            position: absolute;
            top: 0; left: 65px;
            width: 2px; height: 100%;
            border-left: 1px solid #ffb3b3;
            z-index: 2;
        }

        /* Handwriting Content */
        .content {
            font-family: 'Caveat', cursive; /* You can change to 'Homemade Apple' for variation */
            font-size: 25px;
            color: #1c2e7a; /* Ink Blue */
            line-height: var(--line-gap);
            white-space: pre-wrap;
            position: relative;
            z-index: 3;
            /* Precise shift to touch/float just above the blue line */
            transform: translateY(6px); 
        }

        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            #paper { box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="margin-top:0">Record Generator V3</h2>
        <textarea id="txtInput" placeholder="Matter type chey bro (headings ki manual spaces ivvu)..."></textarea>
        
        <div style="margin-bottom: 15px;">
            <label>Paper Type: </label>
            <select id="paperSelector" onchange="updatePaperStyle()">
                <option value="paper-ruled">Ruled Paper</option>
                <option value="paper-white">Plain White</option>
                <option value="paper-rough">Rough/Cream</option>
            </select>
            
            <label> Font: </label>
            <select id="fontSelector" onchange="updateFontStyle()">
                <option value="'Caveat', cursive">Caveat (Clean)</option>
                <option value="'Homemade Apple', cursive">Homemade Apple (Realistic)</option>
                <option value="'Shadows Into Light', cursive">Thin Pen</option>
            </select>
        </div>

        <button class="btn btn-gen" onclick="generate()">Generate Note</button>
        <button class="btn btn-pdf" onclick="download()">Download PDF</button>
    </div>

    <div id="paper-wrapper">
        <div id="paper" class="paper-ruled">
            <div id="margin" class="margin-red"></div>
            <div id="output" class="content"></div>
        </div>
    </div>

<script>
    function updatePaperStyle() {
        const paper = document.getElementById('paper');
        const margin = document.getElementById('margin');
        paper.className = document.getElementById('paperSelector').value;
        
        // Hide margin for plain papers
        if(paper.classList.contains('paper-ruled')) {
            margin.style.display = 'block';
        } else {
            margin.style.display = 'none';
        }
    }

    function updateFontStyle() {
        document.getElementById('output').style.fontFamily = document.getElementById('fontSelector').value;
    }

    function generate() {
        const val = document.getElementById('txtInput').value;
        if(!val) return alert("Text please!");
        document.getElementById('output').innerText = val;
        document.getElementById('paper-wrapper').style.display = 'block';
    }

    function download() {
        const element = document.getElementById('paper');
        const opt = {
            margin: 0,
            filename: 'Handwritten_Note_V3.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 3, useCORS: true }, // Higher scale for better quality
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
