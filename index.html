<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Pro V8 - Ultimate Sync</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Shadows+Into+Light&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-height: 35.45px; /* Precise height for alignment */
            --ink-color: #1a3c8e;
        }

        body { background-color: #2f3640; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .controls { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 650px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        textarea { width: 100%; height: 120px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }

        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin: 5px; }
        .btn-gen { background: #44bd32; }
        .btn-pdf { background: #0097e6; }

        /* Preview Area - Shows how it looks on screen */
        #main-display {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .paper-page {
            width: 210mm;
            height: 297mm;
            background-color: white;
            position: relative;
            box-sizing: border-box;
            padding: 44px 50px 40px 75px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
            /* Critical for PDF paging */
            page-break-after: always;
        }

        .ruled-lines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(#d1e2ff 1.2px, transparent 1.2px);
            background-size: 100% var(--line-height);
            background-position: 0 42px;
            pointer-events: none;
        }

        .red-margin {
            position: absolute;
            top: 0; left: 68px;
            width: 1.5px; height: 100%;
            background-color: #ffcccc;
            border-left: 1px solid #ffb3b3;
        }

        .text-content {
            position: relative;
            z-index: 2;
            font-size: 25px;
            line-height: var(--line-height);
            color: var(--ink-color);
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            padding: 0;
        }

        /* Mobile Adjustments */
        @media (max-width: 800px) {
            #main-display { transform: scale(0.4); transform-origin: top center; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h3 style="margin:0 0 15px 0;">Handwritten Pro V8</h3>
        <textarea id="userInput" placeholder="Ikkada matter paste chey bro..."></textarea>
        
        <div style="margin-bottom: 15px;">
            <select id="fontSelect">
                <option value="'Caveat', cursive">Clean Hand</option>
                <option value="'Shadows Into Light', cursive">Sharp Pen</option>
                <option value="'Nanum Pen Script', cursive">Marker Style</option>
            </select>
            <select id="colorSelect">
                <option value="#1a3c8e">Blue Ink</option>
                <option value="#2d3436">Black Ink</option>
            </select>
        </div>

        <button class="btn btn-gen" onclick="generateNotes()">GENERATE PREVIEW</button>
        <button class="btn btn-pdf" onclick="downloadPDF()">DOWNLOAD PDF</button>
    </div>

    <div id="main-display"></div>

<script>
    function generateNotes() {
        const text = document.getElementById('userInput').value;
        const display = document.getElementById('main-display');
        const font = document.getElementById('fontSelect').value;
        const color = document.getElementById('colorSelect').value;

        if(!text.trim()) { alert("Please enter text first!"); return; }

        display.innerHTML = ''; // Clear existing pages

        const lines = text.split('\n');
        const linesPerPage = 23; // Perfect fit for A4
        
        const totalPages = Math.ceil(lines.length / linesPerPage);

        for (let i = 0; i < totalPages; i++) {
            const page = document.createElement('div');
            page.className = 'paper-page';
            page.style.fontFamily = font;

            const start = i * linesPerPage;
            const end = start + linesPerPage;
            const content = lines.slice(start, end).join('\n');

            page.innerHTML = `
                <div class="ruled-lines"></div>
                <div class="red-margin"></div>
                <div class="text-content" style="color: ${color}">${content}</div>
            `;
            display.appendChild(page);
        }
        
        window.scrollTo({ top: display.offsetTop, behavior: 'smooth' });
    }

    function downloadPDF() {
        const element = document.getElementById('main-display');
        if(!element.hasChildNodes()) { alert("First Generate Preview!"); return; }

        const opt = {
            margin: 0,
            filename: 'Record_Note_Perfect.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
