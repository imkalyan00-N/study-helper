<!DOCTYPE html>
<html>
<head>
  <title>Handwritten Generator ✍️</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

  <h2>Handwritten Generator ✍️</h2>

  <textarea id="inputText" placeholder="Enter text..." rows="4" cols="40"></textarea>
  <br><br>

  <button onclick="generateImage()">Generate</button>

  <br><br>

  <img id="output" style="max-width:90%;" />

  <script>
    async function generateImage() {
      const text = document.getElementById("inputText").value;

      const res = await fetch("/api/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      document.getElementById("output").src = data.image;
    }
  </script>

</body>
</html>
