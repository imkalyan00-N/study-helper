<!DOCTYPE html>
<html>
<head>
  <title>Handwritten Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    textarea {
      width: 320px;
      height: 100px;
      margin-top: 20px;
    }

    canvas {
      margin-top: 20px;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 0 12px rgba(0,0,0,0.2);
    }

    button {
      margin: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Handwritten Notes Generator ✍️</h2>

<textarea id="text" placeholder="Type your answer..."></textarea><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadImage()">Download Image</button>
<button onclick="downloadPDF()">Download PDF</button>

<br>
<canvas id="canvas" width="800" height="600"></canvas>

<script>
function generate() {
  const text = document.getElementById("text").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Paper
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Lines
  ctx.strokeStyle = "#e0e0e0";
  for (let i = 50; i < canvas.height; i += 32) {
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(canvas.width, i);
    ctx.stroke();
  }

  // Margin
  ctx.strokeStyle = "red";
  ctx.beginPath();
  ctx.moveTo(60, 0);
  ctx.lineTo(60, canvas.height);
  ctx.stroke();

  ctx.font = "30px 'Dancing Script'";
  ctx.textBaseline = "middle";

  let x = 80;
  let y = 70;

  const words = text.split(" ");

  words.forEach(word => {
    let tilt = (Math.random() - 0.5) * 0.15;
    let vertical = Math.sin(x * 0.05) * 3 + (Math.random() - 0.5) * 2;
    let ink = 100 + Math.random() * 100;

    ctx.save();
    ctx.translate(x, y + vertical);
    ctx.rotate(tilt);
    ctx.fillStyle = `rgb(0,0,${ink})`;
    ctx.fillText(word, 0, 0);
    ctx.restore();

    x += ctx.measureText(word).width + (5 + Math.random() * 10);

    if (x > 720) {
      x = 80;
      y += 38 + Math.random() * 6;
    }
  });
}

// Download Image
function downloadImage() {
  const canvas = document.getElementById("canvas");
  const link = document.createElement("a");
  link.download = "handwritten.png";
  link.href = canvas.toDataURL();
  link.click();
}

// Download PDF
function downloadPDF() {
  const canvas = document.getElementById("canvas");
  const imgData = canvas.toDataURL("image/png");

  const pdf = new window.jspdf.jsPDF();
  pdf.addImage(imgData, 'PNG', 10, 10, 180, 120);
  pdf.save("handwritten.pdf");
}
</script>

<!-- PDF library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
