<!DOCTYPE html>
<html>
<head>
  <title>Ultra Real Notes ✍️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      background: #eaeaea;
      font-family: sans-serif;
    }

    textarea {
      width: 320px;
      height: 130px;
      display: none;
      margin-top: 10px;
    }

    canvas {
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    button {
      margin: 5px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Handwritten Notes ✍️</h2>

<button onclick="selectPaper('ruled')">Ruled</button>
<button onclick="selectPaper('white')">White</button>
<button onclick="generate()">Generate</button>

<textarea id="text"></textarea>

<br>
<canvas id="canvas"></canvas>

<div>
  <button onclick="downloadImage()">Download Image</button>
</div>

<script>

let paperType="ruled";

function selectPaper(type){
  paperType=type;
  document.getElementById("text").style.display="block";
}

// realistic paper texture
function drawPaper(ctx,h){
  ctx.fillStyle="#fdfcf7";
  ctx.fillRect(0,0,800,h);

  // noise texture
  for(let i=0;i<5000;i++){
    let x=Math.random()*800;
    let y=Math.random()*h;
    ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.03})`;
    ctx.fillRect(x,y,1,1);
  }

  if(paperType==="ruled"){
    ctx.strokeStyle="rgba(100,150,255,0.25)";
    for(let i=60;i<h;i+=30){
      ctx.beginPath();
      ctx.moveTo(0,i);
      ctx.lineTo(800,i);
      ctx.stroke();
    }

    ctx.strokeStyle="rgba(255,0,0,0.3)";
    ctx.beginPath();
    ctx.moveTo(70,0);
    ctx.lineTo(70,h);
    ctx.stroke();
  }
}

// handwriting effect
function drawText(ctx,text,x,y){
  let offset=0;

  for(let char of text){

    let rotate=(Math.random()-0.5)*0.08;
    let upDown=(Math.random()-0.5)*2;

    ctx.save();
    ctx.translate(x+offset,y+upDown);
    ctx.rotate(rotate);

    ctx.fillStyle=`rgba(0,0,150,${0.8+Math.random()*0.2})`;

    ctx.fillText(char,0,0);

    ctx.restore();

    offset += ctx.measureText(char).width + Math.random()*1;
  }
}

function generate(){
  const text=document.getElementById("text").value;
  const lines=text.split("\n");

  let height=1000 + lines.length*30;

  const canvas=document.getElementById("canvas");
  canvas.width=800;
  canvas.height=height;

  const ctx=canvas.getContext("2d");

  drawPaper(ctx,height);

  ctx.font="20px Dancing Script";

  let y=80;

  lines.forEach(line=>{
    if(!line){ y+=20; return; }

    let words=line.split(" ");
    let lineText="";

    words.forEach(word=>{
      let test=lineText+word+" ";
      let w=ctx.measureText(test).width;

      if(w>650){
        drawText(ctx,lineText,90,y);
        lineText=word+" ";
        y+=28;
      }else{
        lineText=test;
      }
    });

    drawText(ctx,lineText,90,y);
    y+=32;
  });

}

// download
function downloadImage(){
  const canvas=document.getElementById("canvas");
  const link=document.createElement("a");
  link.download="notes.png";
  link.href=canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
