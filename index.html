<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwriter FINAL PERFECT</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
    --line-height: 34px;
}

body {
    background: #2c3e50;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    margin: 0;
}

/* UI */
.controls {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 95%;
    max-width: 600px;
    margin-bottom: 20px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
}

/* wrapper */
#paper-wrapper {
    display: none;
    width: 210mm;
}

/* paper */
#paper {
    width: 210mm;
    background: #fff;
    position: relative;
    /* Adjusted padding to create the safety gap before the black line */
    padding: 40px 40px 100px 75px; 
    box-sizing: border-box;
}

/* lines */
.lines {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: linear-gradient(
        transparent calc(var(--line-height) - 1px),
        #b5c9e8 1px
    );
    background-size: 100% var(--line-height);
    background-position: 0 40px;
}

/* margin */
.margin {
    position: absolute;
    left: 65px;
    width: 1px;
    height: 100%;
    background: red;
    z-index: 5;
}

/* text */
.text {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: #1a3c8e;
    line-height: var(--line-height);
    white-space: pre-wrap;
    transform: translateY(7px);
    position: relative;
    z-index: 10;
}

/* 🔥 THE FIX: Creating a block for each line with break-avoidance */
.handwriting-line {
    display: block;
    page-break-inside: avoid;
    break-inside: avoid;
    min-height: var(--line-height);
}

/* Forces a gap before the bottom of the page in PDF */
@media print {
    #paper {
        padding-bottom: 120px; 
    }
}
</style>
</head>

<body>

<div class="controls">
<h2>Handwriter PERFECT ✅</h2>

<textarea id="input" placeholder="Type your answer..."></textarea><br><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="paper-wrapper">
    <div id="paper">
        <div class="lines"></div>
        <div class="margin"></div>
        <div id="output" class="text"></div>
    </div>
</div>

<script>
function generate() {
    const text = document.getElementById("input").value;
    if(!text) return alert("Text rayi bro!");

    const output = document.getElementById("output");
    document.getElementById("paper-wrapper").style.display = "block";
    
    // 🔥 WRAPPING: Every line is its own container
    const lines = text.split('\n');
    output.innerHTML = lines.map(line => `<span class="handwriting-line">${line || '&nbsp;'}</span>`).join('');
}

function downloadPDF() {
    const element = document.getElementById("paper");

    const opt = {
        margin: 0,
        filename: "handwritten.pdf",
        image: { type: 'jpeg', quality: 1.0 },
        html2canvas: {
            scale: 3,
            useCORS: true,
            logging: false,
            letterRendering: true
        },
        jsPDF: {
            unit: 'mm',
            format: 'a4',
            orientation: 'portrait'
        },
        // 🔥 PAGEBREAK LOGIC: 
        // Mode 'css' follows our "break-inside: avoid" rule
        pagebreak: { 
            mode: ['css', 'legacy'], 
            avoid: '.handwriting-line' 
        }
    };

    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
