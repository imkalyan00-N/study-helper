<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Pro V12 - Final Layout</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Shadows+Into+Light&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --line-height: 35.45px;
            --ink-color: #1a3c8e;
        }

        body { background-color: #2c3e50; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Fixed: Controls won't float anymore when scrolling */
        .controls { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 600px; margin-bottom: 30px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; }
        
        textarea { width: 100%; height: 120px; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }

        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin: 5px; }
        .btn-gen { background: #27ae60; }
        .btn-pdf { background: #2980b9; }

        #render-container {
            display: none;
            flex-direction: column;
            width: 210mm;
        }

        .paper-page {
            width: 210mm;
            height: 297mm;
            background-color: white;
            position: relative;
            box-sizing: border-box;
            padding: 44.5px 50px 40px 75px; 
            overflow: hidden;
            /* Added margin and black divider to prevent text cutting */
            border-bottom: 3px solid #000;
            margin-bottom: 40px; 
            page-break-after: always;
        }

        .lines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(#d1e2ff 1.2px, transparent 1.2px);
            background-size: 100% var(--line-height);
            background-position: 0 42px;
            pointer-events: none;
        }

        .margin {
            position: absolute;
            top: 0; left: 68px; width: 2px; height: 100%;
            border-left: 1.5px solid #ffb3b3;
        }

        .text {
            position: relative;
            z-index: 10;
            font-size: 25.8px; /* Fine-tuned size */
            line-height: var(--line-height);
            color: var(--ink-color);
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            padding: 0;
        }

        @media (max-width: 210mm) {
            #render-container { transform: scale(0.45); transform-origin: top center; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <textarea id="userInput" placeholder="Matter paste chey bro..."></textarea>
        <div>
            <select id="font" style="padding:8px;"><option value="'Caveat', cursive">Clean</option><option value="'Shadows Into Light', cursive">Sharp</option></select>
            <select id="color" style="padding:8px;"><option value="#1a3c8e">Blue</option><option value="#222">Black</option></select>
        </div>
        <button class="btn btn-gen" onclick="generate()">Generate Preview</button>
        <button class="btn btn-pdf" onclick="download()">Download PDF</button>
    </div>

    <div id="render-container"></div>

<script>
    function generate() {
        const text = document.getElementById('userInput').value;
        const container = document.getElementById('render-container');
        if(!text.trim()) return;

        container.innerHTML = '';
        container.style.display = 'flex';

        const lines = text.split('\n');
        const linesPerPage = 23; 
        
        for (let i = 0; i < Math.ceil(lines.length / linesPerPage); i++) {
            const page = document.createElement('div');
            page.className = 'paper-page';
            page.style.fontFamily = document.getElementById('font').value;

            const content = lines.slice(i * linesPerPage, (i + 1) * linesPerPage).join('\n');

            page.innerHTML = `
                <div class="lines"></div>
                <div class="margin"></div>
                <div class="text" style="color:${document.getElementById('color').value}">${content}</div>
            `;
            container.appendChild(page);
        }
        // Smooth scroll to results
        window.scrollTo({ top: container.offsetTop - 20, behavior: 'smooth' });
    }

    function download() {
        const element = document.getElementById('render-container');
        if(!element.innerHTML) return alert("First Generate Preview!");

        // Hide black line and margins temporarily for clean PDF
        const pages = document.querySelectorAll('.paper-page');
        pages.forEach(p => {
            p.style.borderBottom = 'none';
            p.style.marginBottom = '0';
        });

        const opt = {
            margin: 0,
            filename: 'Handwritten_Note.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).toPdf().get('pdf').then(() => {
            // Restore visual dividers after PDF generation
            pages.forEach(p => {
                p.style.borderBottom = '3px solid #000';
                p.style.marginBottom = '40px';
            });
        }).save();
    }
</script>

</body>
</html>
